<div id="view-gmrl" class="app-view hidden w-full pb-10">
  
  <div class="w-full text-center mt-2 mb-4 px-1">
    <h2 class="text-2xl sm:text-3xl font-bold text-[#0C3175] inline-flex items-center justify-center gap-2">
      <span class="text-3xl drop-shadow-md">🏢</span> บันทึกงานซ่อมทั่วไป (GMRL)
    </h2>
    <p class="text-sm font-bold text-gray-500 mt-1 uppercase tracking-widest" >Facility Maintenance Log</p>
  </div>

  
  <style>
    /* 1. สไตล์ช่องกรอกพื้นฐาน - ปรับพื้นหลังเป็นสีขาวทั้งหมดตามสั่ง */
    #gmrlForm .wave-group .wave-textarea { 
      background-color: #ffffff !important; 
      resize: none; 
      min-height: 52px; 
      height: 52px; 
      overflow-y: hidden; 
      display: block; 
      line-height: 1.5; 
      padding-top: 18px; 
      padding-bottom: 10px; 
    }
    
    #gmrlForm .wave-input {
      background-color: #ffffff !important;
    }

    /* 2. สีตัวอักษรในช่อง (สีฟ้าเมื่อมีการพิมพ์) */
    #gmrlForm .wave-input,
    #gmrlForm .wave-textarea { 
      color: #2563eb !important; 
      font-weight: 700 !important; 
      border: 1px solid #e5e7eb;
    }

    /* แก้ไข Chrome Autofill ให้เป็นสีฟ้าตามระบบ */
    #gmrlForm .wave-input:-webkit-autofill,
    #gmrlForm .wave-textarea:-webkit-autofill { 
      -webkit-box-shadow: 0 0 0 30px #ffffff inset !important; 
      transition: background-color 5000s ease-in-out 0s; 
      -webkit-text-fill-color: #2563eb !important; 
      font-weight: 700 !important; 
    }
    
    /* 3. เอฟเฟกต์ Label: แก้ปัญหากรอบสีขาวทับข้อความแบบเด็ดขาด */
    #gmrlForm .wave-label { 
      position: absolute;
      top: 14px;
      left: 12px;
      color: #9ca3af; /* สีเทาตอนว่าง */
      background-color: transparent; /* ล้างพื้นหลังตอนว่าง จะได้ไม่บังข้อความ */
      padding: 0 6px; 
      transition: all 0.2s ease; 
      pointer-events: none; 
      z-index: 10;
    }

    /* เมื่อมีการ Focus หรือมีข้อมูล (ลอยขึ้นไปที่เส้นขอบ) */
    #gmrlForm .wave-input:focus ~ .wave-label,
    #gmrlForm .wave-input:not(:placeholder-shown) ~ .wave-label,
    #gmrlForm .wave-textarea:focus ~ .wave-label,
    #gmrlForm .wave-textarea:not(:placeholder-shown) ~ .wave-label,
    #gmrlForm .wave-textarea.has-value ~ .wave-label { 
      top: -8px !important; /* จัดให้อยู่กึ่งกลางเส้นขอบพอดี */
      left: 10px;
      font-size: 12px;
      color: #2563eb !important; 
      font-weight: 800; 
      z-index: 30; /* ดันเลเยอร์ขึ้นบนสุด */
      background-color: #ffffff; /* เปิดพื้นหลังสีขาวเพื่อบังเส้นขอบ */
      height: 16px; /* ⚡ บังคับความสูงให้พอดีกับตัวอักษร (ไม่ย้อยลงมาทับข้อความ) */
      line-height: 16px; 
      border-radius: 4px;
    }

    /* 4. Animation ปุ่มและไฟวิ่ง (คงเดิมตามระบบเจ้านาย) */
    @keyframes pulse-blue-glow-gmrl { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); transform: scale(1); } 50% { box-shadow: 0 0 0 12px rgba(37, 99, 235, 0); transform: scale(1.02); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); transform: scale(1); } }
    #gmrlSubmitBtn { animation: pulse-blue-glow-gmrl 2s infinite; transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    #gmrlSubmitBtn:active { transform: scale(0.94) !important; animation: none; }

    @keyframes run-arrow-left-g { 0%, 100% { transform: translateX(-4px) scale(0.9); opacity: 0.3; } 50% { transform: translateX(4px) scale(1.1); opacity: 1; text-shadow: 0 0 12px rgba(255,255,255,1); } }
    @keyframes run-arrow-right-g { 0%, 100% { transform: translateX(4px) scale(0.9); opacity: 0.3; } 50% { transform: translateX(-4px) scale(1.1); opacity: 1; text-shadow: 0 0 12px rgba(255,255,255,1); } }
    .arr-left span { display: inline-block; animation: run-arrow-left-g 0.7s infinite ease-in-out; }
    .arr-left span:nth-child(1) { animation-delay: 0s; } .arr-left span:nth-child(2) { animation-delay: 0.15s; }
    .arr-right span { display: inline-block; animation: run-arrow-right-g 0.7s infinite ease-in-out; }
    .arr-right span:nth-child(1) { animation-delay: 0.15s; } .arr-right span:nth-child(2) { animation-delay: 0s; }

    /* แก้ Dropdown สีใส */
    #gmrlForm select.wave-input:invalid { color: transparent !important; -webkit-text-fill-color: transparent !important; }
    #gmrlForm select.wave-input option { color: #1f2937 !important; -webkit-text-fill-color: initial !important; }
    #gmrlForm select.wave-input:valid { color: #2563eb !important; -webkit-text-fill-color: #2563eb !important; font-weight: 700 !important; }
  </style>
