<script>
  // ==========================================
  // 🛡️ โซนที่ 1: ระบบตัวแปรหลัก (Global Variables)
  // ==========================================
  var isVoiceEnabled = false; 
  var assetMasterList = []; 
  var openTransactionsData = []; 
  var currentStep = 1; 
  var totalSteps = 4; 
  var GITHUB_SCANNER_URL = "https://nu-nonl-dev.github.io/tha-scanner"; 
  var APP_EXEC_URL = "https://script.google.com/macros/s/AKfycbxP73jILpsFQlkRYRud5_SwdUe6Mm1bFfgmPDaj8g1w1MiCBrdXWRamNw9ydw5mBiew/exec";
  var scanTargetInput = ""; 

  // ==========================================
  // 🎙️ โซนที่ 2: เครื่องยนต์ J.A.R.V.I.S. (AI Voice)
  // ==========================================
  if ('speechSynthesis' in window) { window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); }; }

  function toggleVoice() {
    isVoiceEnabled = !isVoiceEnabled;
    var btn = document.getElementById('voiceToggleBtn');
    var icon = document.getElementById('voiceIcon');
    var text = document.getElementById('voiceText');
    var pulse = document.getElementById('voicePulse');
    
    if (isVoiceEnabled) {
      if(icon) icon.innerHTML = '🔊';
      if(text) { text.innerHTML = 'AI:ON'; text.className = 'text-xs font-bold tracking-widest text-green-300 transition-colors'; }
      if(btn) btn.classList.add('border-green-400/50', 'bg-green-900/40');
      if(pulse) pulse.classList.add('animate-ping', 'opacity-75'); 
      
      var currentSubtitle = document.getElementById('headerSubtitle') ? document.getElementById('headerSubtitle').innerText : "";
      
      if (currentSubtitle.includes("Dashboard Center") || currentSubtitle.includes("Dashboard")) {
          speakAI('ระบบเสียงเปิดใช้งานแล้วค่ะ, โหมดข้อมูล Dashboard พร้อมใช้งานค่ะ');
      } else if (currentSubtitle.includes("Asset Registration")) {
          speakAI('ระบบเสียงเปิดใช้งานแล้วค่ะ, สำหรับการขึ้นทะเบียนสินทรัพย์ใหม่, กรุณากรอกข้อมูลให้ครบทั้ง 4 หน้าตามลำดับนะค่ะ');
      } else {
          speakAI('ระบบเสียงเปิดใช้งานแล้วค่ะ, ยินดีต้อนรับเข้าสู่ระบบ Smart Asset Management ค่ะ');
      }

    } else {
      if(icon) icon.innerHTML = '🔇';
      if(text) { text.innerHTML = 'AI:OFF'; text.className = 'text-xs font-bold tracking-widest text-blue-100 transition-colors'; }
      if(btn) btn.classList.remove('border-green-400/50', 'bg-green-900/40');
      if(pulse) pulse.classList.remove('animate-ping', 'opacity-75');
      if('speechSynthesis' in window) window.speechSynthesis.cancel();
    }
  }

  function speakAI(text, isAlert) {
    if (!isVoiceEnabled || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel(); 
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'th-TH'; 
    if (isAlert) { utterance.pitch = 1.3; utterance.rate = 1.0; }
    else { utterance.pitch = 1.1; utterance.rate = 0.95; }
    window.speechSynthesis.speak(utterance);
  }

  // ==========================================
  // 🔽 โซนที่ 3: ระบบ UI & Navigation (J.A.R.V.I.S. Integrated)
  // ==========================================
  
  /**
   * ตรวจสอบการแสดง/ซ่อน ปุ่ม Scroll และ ปุ่ม Refresh
   */
  function checkScrollIndicator() {
    var scrollBtn = document.getElementById('scrollIndicator');
    var refreshBtn = document.getElementById('refreshDataContainer'); // ⚡ เพิ่มการอ้างอิงปุ่ม Refresh
    
    if (!scrollBtn && !refreshBtn) return;

    var isScrollable = document.documentElement.scrollHeight > window.innerHeight + 50;
    var isAtBottom = (window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 80;

    // เงื่อนไขการแสดงผล (ใช้ Logic เดิมของคุณ)
    if (isScrollable && !isAtBottom) { 
      if (scrollBtn) { scrollBtn.style.opacity = '1'; scrollBtn.style.pointerEvents = 'auto'; }
      if (refreshBtn) { refreshBtn.style.opacity = '1'; refreshBtn.style.pointerEvents = 'auto'; }
    } 
    else { 
      if (scrollBtn) { scrollBtn.style.opacity = '0'; scrollBtn.style.pointerEvents = 'none'; }
      if (refreshBtn) { refreshBtn.style.opacity = '0'; refreshBtn.style.pointerEvents = 'none'; }
    }
  }
  window.addEventListener('scroll', checkScrollIndicator);

  /**
   * ฟังก์ชันจัดการการรีเฟรช (Sci-Fi Loading Effect + Time Sync Double Blink)
   */
  function handleRefreshClick(btn) {
    btn.classList.add('!bg-[#2563eb]', '!text-white', 'shadow-[0_0_15px_rgba(37,99,235,0.6)]');

    const ringOuter = document.getElementById('ringOuter');
    const ringInner = document.getElementById('ringInner');
    const coreIcon = document.getElementById('coreIcon'); 

    if(ringOuter) { ringOuter.classList.replace('border-transparent', 'border-[#04d4d4]'); ringOuter.classList.add('animate-spin'); }
    if(ringInner) { ringInner.classList.replace('border-transparent', 'border-blue-400'); ringInner.classList.add('animate-spin'); }
    if(coreIcon) { coreIcon.classList.add('text-[#04d4d4]', 'animate-spin'); }

    console.log("J.A.R.V.I.S. Core Syncing...");

    // ส่งคำสั่งดึงข้อมูล
    if (typeof loadDashboardData === "function") {
        loadDashboardData(true); 
    } else if (typeof initDashboard === "function") {
        initDashboard();
    }

    // ⏱️ ตั้งเวลา 1.5 วินาทีให้เฟืองหยุด
    setTimeout(() => {
        if(ringOuter) { ringOuter.classList.remove('animate-spin'); ringOuter.classList.replace('border-[#04d4d4]', 'border-transparent'); }
        if(ringInner) { ringInner.classList.remove('animate-spin'); ringInner.classList.replace('border-blue-400', 'border-transparent'); }
        if(coreIcon) { coreIcon.classList.remove('text-[#04d4d4]', 'animate-spin'); }

        btn.classList.remove('!bg-[#2563eb]', '!text-white', 'shadow-[0_0_15px_rgba(37,99,235,0.6)]');
        btn.blur();

        // ⚡ [อัปเกรดล่าสุด] อัปเดตเวลา + เอฟเฟกต์กระพริบ 2 ครั้งแบบ Sci-Fi
        const timeEl = document.getElementById('syncTimeText');
        if (timeEl) {
            // อัปเดตเป็นเวลาล่าสุด
            timeEl.innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH')}`;
            
            // สั่งกระพริบ 2 รอบ (สว่าง -> ดับ -> สว่าง -> ดับ -> กลับเป็นปกติ)
            timeEl.animate([
                { opacity: 1, color: '#04d4d4', transform: 'scale(1.1)' }, // 1. สว่างวาบ (Cyan)
                { opacity: 1, color: '#0000FF', transform: 'scale(1.1)' }, // 1. สว่างวาบ (Cyan)
                { opacity: 0, color: '#04d4d4', transform: 'scale(1.1)' }, // 2. ดับ
                { opacity: 1, color: '#0000FF', transform: 'scale(1.1)' }, // 3. สว่างวาบ (Cyan)
                { opacity: 1, color: '#04d4d4', transform: 'scale(1.1)' }, // 3. สว่างวาบ (Cyan)
                { opacity: 0, color: '#0000FF', transform: 'scale(1.1)' }, // 4. ดับ
                { opacity: 1, transform: 'scale(1)' }                      // 5. คืนค่าปกติ
            ], {
                duration: 600, // ความเร็วรวม 0.6 วินาที (กำลังสวย ไม่ตาลาย)
                iterations: 1,
                easing: 'ease-in-out'
            });
        }
    }, 1500); 
  }

// --- ฟังก์ชันอื่นๆ (switchView, toggleSidebar, switchBorrowTab) ของคุณทำงานตามเดิม --- //
// =======================================================
// 🌟 J.A.R.V.I.S. HOLOGRAPHIC MENU & SIDEBAR (HOTFIX)
// =======================================================

// =========================================================
// 1. ระบบสลับหน้าจอ (Holographic Transition) - V.398 Optimized
// =========================================================
function switchView(viewName) {
  try {
    // โหลดข้อมูลเริ่มต้นตามหน้าต่างๆ
    if (viewName === 'dashboard') { if (typeof loadDashboardData === 'function') loadDashboardData(); }
    if (viewName === 'gmrl') { if (typeof initGmrlPage === 'function') initGmrlPage(); }
    // 🌟 เพิ่มจุดเช็คสำหรับหน้า Safety (ถ้ามีฟังก์ชันเคลียร์ค่าเริ่มต้น)
    if (viewName === 'safety') { if (typeof clearSfAsset === 'function') clearSfAsset(); }
  } catch (e) { console.error("View Trigger Error:", e); }

  // จัดการสถานะเมนู (ถอดคลาส Active ออกจากทุกปุ่ม)
  document.querySelectorAll('.menu-item').forEach(function(el) {
    el.classList.remove('bg-blue-50', 'text-brandBlue', 'font-bold', 'border-r-4', 'border-brandBlue', 'active-menu');
    el.classList.add('text-gray-600', 'font-semibold');
  });

  // ใส่คลาส Active ให้ปุ่มที่ถูกเลือก
  var menu = document.getElementById('menu-' + viewName);
  if(menu) {
    menu.classList.remove('text-gray-600', 'font-semibold');
    menu.classList.add('bg-blue-50', 'text-brandBlue', 'font-bold', 'border-r-4', 'border-brandBlue', 'active-menu');
  }

  // 📝 อัปเดตชื่อหัวข้อ (Subtitle) และให้ AI พูดทักทาย
  var subtitle = document.getElementById('headerSubtitle');
  if(subtitle) {
      if(viewName==='asset') { subtitle.innerText = "Asset Registration"; if(typeof speakAI === 'function') speakAI("โหมด ขึ้นทะเบียนอุปกรณ์และเครื่องมือ พร้อมใช้งานค่ะ"); }
      if(viewName==='maintenance') { subtitle.innerText = "Maintenance / PM"; if(typeof speakAI === 'function') speakAI("โหมด บันทึกซ่อมบำรุง และ พีเอ็ม พร้อมใช้งานค่ะ"); }
      if(viewName==='borrow') { subtitle.innerText = "Borrow / Return"; if(typeof speakAI === 'function') speakAI("โหมด ยืมคืนอุปกรณ์และเครื่องมือ พร้อมใช้งานค่ะ"); }
      if(viewName==='transfer') { subtitle.innerText = "Transfer Asset"; if(typeof speakAI === 'function') speakAI("โหมด โอนย้ายสินทรัพย์ระหว่างสาขา พร้อมใช้งานค่ะ"); }
      if(viewName==='dashboard') { subtitle.innerText = "Dashboard Center"; if(typeof speakAI === 'function') speakAI("ยินดีต้อนรับเข้าสู่โหมด สมาร์ท แดชบอร์ด นะค่ะ"); }
      if(viewName==='reprint-tag') { subtitle.innerText = "Reprint Asset Tag"; if(typeof speakAI === 'function') speakAI("โหมด สร้างป้าย แท็ก คิวอาร์ ทดแทน พร้อมใช้งานค่ะ"); }
      if(viewName==='gmrl') { subtitle.innerText = "General Repair Log"; if(typeof speakAI === 'function') speakAI("โหมด บันทึกงานซ่อมบำรุงทั่วไป พร้อมใช้งานค่ะ"); }
      // 🛡️ เพิ่มส่วนของ Safety Audit ตรงนี้ครับเจ้านาย!
      if(viewName==='safety') { subtitle.innerText = "Safety Audit"; if(typeof speakAI === 'function') speakAI("โหมด ตรวจสอบความปลอดภัยอาคารและอุปกรณ์ พร้อมใช้งานค่ะ"); }
  }

  // --- ส่วนแอนิเมชันสลับหน้าจอ (Transition) ---
  var target = document.getElementById('view-' + viewName);
  var activeViews = [];

  document.querySelectorAll('.app-view').forEach(function(el) {
    if(el.style.display !== 'none' && el.id !== ('view-' + viewName)) {
      activeViews.push(el);
      el.style.transition = 'all 0.35s cubic-bezier(0.4, 0, 0.2, 1)';
      el.style.transform = 'scale(0.96) translateY(-15px)';
      el.style.opacity = '0';
      el.classList.remove('active');
    }
  });

  setTimeout(function() {
    activeViews.forEach(function(el) { el.style.display = 'none'; });

    if(target) {
      target.style.display = 'block';
      target.style.transition = 'none';
      target.style.transform = 'scale(1.03) translateY(25px)';
      target.style.opacity = '0';

      void target.offsetWidth; // Force Reflow

      target.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
      target.style.transform = 'scale(1) translateY(0)';
      target.style.opacity = '1';
      target.classList.add('active');
    }
  }, 350);

  // ปิด Sidebar อัตโนมัติ (ถ้าเปิดค้างไว้ในมือถือ)
  var overlay = document.getElementById('sidebarOverlay');
  if(overlay && !overlay.classList.contains('hidden')) {
      toggleSidebar(); 
  }

  if(typeof checkScrollIndicator === 'function') setTimeout(checkScrollIndicator, 600);
}

// 2. ระบบสลับแท็บ ยืม/คืน
function switchBorrowTab(tab) {
  var btnB = document.getElementById('tabBorrow'); var btnR = document.getElementById('tabReturn');
  var formB = document.getElementById('borrowForm'); var formR = document.getElementById('returnForm');

  var hideForm = tab === 'borrow' ? formR : formB;
  var showForm = tab === 'borrow' ? formB : formR;

  if (tab === 'borrow') {
    if(btnB) btnB.className = "flex-1 py-3 text-sm font-bold rounded-lg bg-white shadow-sm border-2 border-brandBlue text-brandBlue transition-all";
    if(btnR) btnR.className = "flex-1 py-3 text-sm font-bold rounded-lg border-2 border-transparent text-gray-500 hover:text-brandDark transition-all";
  } else {
    if(btnR) btnR.className = "flex-1 py-3 text-sm font-bold rounded-lg bg-white shadow-sm border-2 border-brandBlue text-brandBlue transition-all";
    if(btnB) btnB.className = "flex-1 py-3 text-sm font-bold rounded-lg border-2 border-transparent text-gray-500 hover:text-brandDark transition-all";
    google.script.run.withSuccessHandler(populateOpenTransList).getOpenTransactions();
  }

  if (hideForm && !hideForm.classList.contains('hidden')) {
    hideForm.style.transition = 'all 0.25s ease-out';
    hideForm.style.opacity = '0';
    hideForm.style.transform = tab === 'borrow' ? 'translateX(20px)' : 'translateX(-20px)';

    setTimeout(function() {
      hideForm.classList.add('hidden');
      if(showForm) {
        showForm.classList.remove('hidden');
        showForm.style.transition = 'none';
        showForm.style.opacity = '0';
        showForm.style.transform = tab === 'borrow' ? 'translateX(-20px)' : 'translateX(20px)';

        void showForm.offsetWidth;

        showForm.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
        showForm.style.opacity = '1';
        showForm.style.transform = 'translateX(0)';
      }
    }, 250);
  } else if (showForm && showForm.classList.contains('hidden')) {
     showForm.classList.remove('hidden');
  }
  setTimeout(checkScrollIndicator, 400);
}

// 2.1 ⚡ สลับแท็บ ขึ้นทะเบียนใหม่ / รับโอนเข้า (🌟 J.A.R.V.I.S. Cinematic Smooth Glide)
function switchAssetTab(tab) {
  var btnNew = document.getElementById('tabNewAsset');     
  var btnTransfer = document.getElementById('tabTransferIn'); 
  var formNew = document.getElementById('newAssetForm');   
  var formTransfer = document.getElementById('transferInForm'); 

  var hideForm = tab === 'new' ? formTransfer : formNew;
  var showForm = tab === 'new' ? formNew : formTransfer;

  // ป้องกันการกดแท็บเดิมซ้ำ
  if (showForm && !showForm.classList.contains('hidden')) return;

  // 1. สลับสีปุ่ม
  if (tab === 'new') {
    if(btnNew) btnNew.className = "flex-1 py-3 text-sm font-bold rounded-lg bg-white shadow-sm border-2 border-brandBlue text-brandBlue transition-all duration-300";
    if(btnTransfer) btnTransfer.className = "flex-1 py-3 text-sm font-bold rounded-lg border-2 border-transparent text-gray-500 hover:text-brandDark transition-all duration-300";
  } else {
    if(btnTransfer) btnTransfer.className = "flex-1 py-3 text-sm font-bold rounded-lg bg-white shadow-sm border-2 border-brandBlue text-brandBlue transition-all duration-300";
    if(btnNew) btnNew.className = "flex-1 py-3 text-sm font-bold rounded-lg border-2 border-transparent text-gray-500 hover:text-brandDark transition-all duration-300";
  }

  // 🌟 2. แอนิเมชันสลับแท็บแบบ เนิบๆ สมูทๆ
  if (hideForm && !hideForm.classList.contains('hidden')) {
    // ขาออก: ละลายหายไปแบบนุ่มนวล (0.4s) และสไลด์ออกไปไกลขึ้นนิดนึง (60px)
    hideForm.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)'; 
    hideForm.style.opacity = '0';
    hideForm.style.transform = tab === 'new' ? 'translateX(60px)' : 'translateX(-60px)'; 
    
    // หน่วงเวลาให้ตาเราเห็นตอนมันหายไปก่อน (400ms) แล้วค่อยดึงหน้าใหม่มา
    setTimeout(function() {
      hideForm.classList.add('hidden');
      
      if(showForm) {
        showForm.classList.remove('hidden');
        showForm.style.transition = 'none';
        showForm.style.opacity = '0';
        showForm.style.transform = tab === 'new' ? 'translateX(-60px)' : 'translateX(60px)'; 
        
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            // ขาเข้า: วิ่งเข้ามาแบบ เนิบๆ ร่อนๆ (0.7s) ไม่มีเด้งกระแทก (Ease-Out)
            showForm.style.transition = 'all 0.7s cubic-bezier(0.22, 1, 0.36, 1)';
            showForm.style.opacity = '1';
            showForm.style.transform = 'translateX(0)';
          });
        });
      }
    }, 400); 
  } else {
    if(showForm) {
        showForm.classList.remove('hidden');
        showForm.style.transition = 'none';
        showForm.style.opacity = '0';
        showForm.style.transform = tab === 'new' ? 'translateX(-60px)' : 'translateX(60px)'; 
        
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            showForm.style.transition = 'all 0.7s cubic-bezier(0.22, 1, 0.36, 1)';
            showForm.style.opacity = '1';
            showForm.style.transform = 'translateX(0)';
          });
        });
    }
  }

  if (typeof checkScrollIndicator === 'function') setTimeout(checkScrollIndicator, 600); 
}

// 3. ระบบ เปิด/ปิด แถบสไลด์บาร์ (รวมให้ใหม่ ป้องกันโค้ดแหว่ง)
function toggleSidebar() {
  var sb = document.getElementById('sidebar'); var overlay = document.getElementById('sidebarOverlay');
  var icon = document.getElementById('sidebarIcon'); var btn = document.getElementById('sidebarToggleBtn');
  var hamburgerBtn = document.getElementById('mainNavHamburger');
  var line1 = document.getElementById('navLine1'); var line2 = document.getElementById('navLine2'); var line3 = document.getElementById('navLine3');

  if (sb && overlay) {
    if (sb.classList.contains('translate-x-full')) {
      sb.classList.remove('translate-x-full'); overlay.classList.remove('hidden');
      if(icon) icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>';
      if(btn) btn.classList.replace('opacity-40', 'opacity-100'); if(hamburgerBtn) hamburgerBtn.style.opacity = '0';
      if(line1) { line1.classList.add('rotate-45', 'translate-y-[7.5px]'); if(line2) line2.classList.add('opacity-0', 'translate-x-4'); if(line3) line3.classList.add('-rotate-45', '-translate-y-[7.5px]'); }
    } else {
      sb.classList.add('translate-x-full'); overlay.classList.add('hidden');
      if(icon) icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>';
      if(btn) btn.classList.replace('opacity-100', 'opacity-40'); if(hamburgerBtn) hamburgerBtn.style.opacity = '1';
      if(line1) { line1.classList.remove('rotate-45', 'translate-y-[7.5px]'); if(line2) line2.classList.remove('opacity-0', 'translate-x-4'); if(line3) line3.classList.remove('-rotate-45', '-translate-y-[7.5px]'); }
    }
  }
}

  // ==========================================
  // 🎨 โซนที่ 4: เอฟเฟกต์ช่องกรอก (Smart Inputs & Form Behaviors)
  // ==========================================
  function initWaveLabels() { document.querySelectorAll('.wave-label').forEach(function(label) { var text = label.innerText; label.innerHTML = text.split('').map(function(letter, idx) { return '<span style="transition-delay: ' + (idx * 25) + 'ms">' + (letter === ' ' ? '&nbsp;' : letter) + '</span>'; }).join(''); }); }
  
  function initWaveInputs() { 
      var updateInputState = function(input) { 
          if (input.value && input.value.trim() !== "") input.classList.add('has-value'); 
          else input.classList.remove('has-value'); 
      }; 
      document.querySelectorAll('.wave-input, .wave-textarea').forEach(function(input) { 
          updateInputState(input); 
          input.addEventListener('input', function() { updateInputState(input); }); 
          input.addEventListener('change', function() { updateInputState(input); }); 
      }); 
  }

  function toggleDropdownClearBtn(selectEl) {
      var container = selectEl.closest('.wave-group'); if(!container) return;
      var arrow = container.querySelector('.select-arrow');
      var clearBtn = container.querySelector('.input-clear-btn');
      
      if (selectEl.value && selectEl.value !== '') {
          if(arrow) arrow.classList.add('hidden');
          if(clearBtn) clearBtn.classList.remove('hidden');
      } else {
          if(arrow) arrow.classList.remove('hidden');
          if(clearBtn) clearBtn.classList.add('hidden');
      }
  }

  function clearSelectField(btn) {
      var container = btn.closest('.wave-group'); if(!container) return;
      var selectEl = container.querySelector('select');
      if (selectEl) {
          selectEl.value = '';
          toggleDropdownClearBtn(selectEl); 
          if(typeof toggleDropdownNew === 'function') toggleDropdownNew(selectEl.id); 
      }

  function toggleWarrantyLock(hasWarranty) {
    var toggleInputs = document.querySelectorAll('.w-toggle');

  var smartDropdownData = {}; 

  function initSmartDropdown(config) {
    var id = config.id;
    smartDropdownData[id] = config.data || [];
    
    var displayInput = document.getElementById(id + 'Display');
    var hiddenInput = document.getElementById(id);
    var listEl = document.getElementById(id + 'CustomList');
    var clearBtn = document.getElementById('clear_' + id + '_dropdown');
    var arrowIcon = document.getElementById(id + '_arrowIcon');
    var container = document.getElementById(id + 'Container');
    
    if(!displayInput || !hiddenInput || !listEl) return;

    displayInput.addEventListener('input', function() {
      renderSmartDropdown(id, this.value, config.allowOther);
      if(clearBtn) clearBtn.classList.toggle('hidden', this.value === '');
    });

    displayInput.addEventListener('focus', function() {
      renderSmartDropdown(id, this.value, config.allowOther);
      listEl.classList.add('active');
      if(arrowIcon) arrowIcon.classList.add('rotate-180');
    });

    document.addEventListener('click', function(e) {
      if (container && !container.contains(e.target)) {
        listEl.classList.remove('active');
        if(arrowIcon) arrowIcon.classList.remove('rotate-180');
        
        if(hiddenInput.value === '' && displayInput.value !== '') {
           displayInput.value = ''; 
           if(clearBtn) clearBtn.classList.add('hidden');
           displayInput.classList.remove('has-value');
        }
      }
    });
  }

  function toggleSmartDropdown(id) {
    var listEl = document.getElementById(id + 'CustomList');
    var displayInput = document.getElementById(id + 'Display');
    var arrowIcon = document.getElementById(id + '_arrowIcon');
    var container = document.getElementById(id + 'Container');
    var allowOther = container ? (container.getAttribute('data-allow-other') === 'true') : true;

    if(listEl.classList.contains('active')) {
       listEl.classList.remove('active');
       if(arrowIcon) arrowIcon.classList.remove('rotate-180');
    } 
    else {
       renderSmartDropdown(id, displayInput.value, allowOther);
       listEl.classList.add('active');
       if(arrowIcon) arrowIcon.classList.add('rotate-180');
       displayInput.focus();
    }

    setTimeout(() => {
        if (listEl && listEl.classList.contains('active')) {
            const rect = listEl.getBoundingClientRect();
            if (rect.bottom > window.innerHeight) {
                container.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }, 50);
  }

  function renderSmartDropdown(id, filterText, allowOther) {
    var listEl = document.getElementById(id + 'CustomList');
    if(!listEl) return;
    
    listEl.innerHTML = '';
    var searchTerms = filterText.toLowerCase().trim().split(/\s+/);
    var filtered = smartDropdownData[id].filter(function(item) {
       return searchTerms.every(function(term) { return item.toLowerCase().indexOf(term) !== -1; });
    });

    filtered.forEach(function(val) {
      var li = document.createElement('li');
      li.className = 'smart-dropdown-item';
      li.textContent = val;
      li.onmousedown = function(e) { e.preventDefault(); selectSmartDropdown(id, val, false); }; 
      listEl.appendChild(li);
    });

    if(allowOther) {
      var addLi = document.createElement('li');
      addLi.className = 'smart-dropdown-item add-new';
      addLi.textContent = "+ อื่นๆ (พิมพ์เพิ่มเอง)...";
      addLi.onmousedown = function(e) { e.preventDefault(); selectSmartDropdown(id, 'อื่นๆ', true); };
      listEl.appendChild(addLi);
    }
  }

  function selectSmartDropdown(id, val, isOther) {
    var displayInput = document.getElementById(id + 'Display');
    var hiddenInput = document.getElementById(id);
    var listEl = document.getElementById(id + 'CustomList');
    var newDiv = document.getElementById('new_' + id);
    var clearBtn = document.getElementById('clear_' + id + '_dropdown');
    var arrowIcon = document.getElementById(id + '_arrowIcon'); 

    if(isOther) {
      displayInput.value = 'อื่นๆ (โปรดระบุด้านล่าง)';
      hiddenInput.value = 'อื่นๆ';
      if(newDiv) {
          newDiv.classList.remove('hidden');
          var newInput = newDiv.querySelector('input, textarea');
          if(newInput) { newInput.required = true; newInput.focus(); }
      }
    } else {
      displayInput.value = val;
      hiddenInput.value = val;
      if(newDiv) {
          newDiv.classList.add('hidden');
          var newInput = newDiv.querySelector('input, textarea');
          if(newInput) { newInput.required = false; newInput.value = ''; newInput.classList.remove('has-value'); }
      }
    }
    
    displayInput.classList.add('has-value');
    if(clearBtn) clearBtn.classList.remove('hidden');
    
    listEl.classList.remove('active');
    if(arrowIcon) arrowIcon.classList.remove('rotate-180');
    
    if(typeof initWaveInputs === 'function') initWaveInputs(); 
  }

  function clearSmartDropdown(id) {
    var displayInput = document.getElementById(id + 'Display');
    var hiddenInput = document.getElementById(id);
    var clearBtn = document.getElementById('clear_' + id + '_dropdown');
    var newDiv = document.getElementById('new_' + id);
    var arrowIcon = document.getElementById(id + '_arrowIcon');
    
    if(displayInput) { displayInput.value = ''; displayInput.classList.remove('has-value'); displayInput.focus(); }
    if(hiddenInput) hiddenInput.value = '';
    if(clearBtn) clearBtn.classList.add('hidden');
    if(newDiv) {
        newDiv.classList.add('hidden');
        var newInput = newDiv.querySelector('input, textarea');
        if(newInput) { newInput.required = false; newInput.value = ''; newInput.classList.remove('has-value'); }
    }
    if(arrowIcon) arrowIcon.classList.add('rotate-180');
    renderSmartDropdown(id, '', true); 
  }

    if(badge) { badge.innerText = "กำลังคำนวณ..."; badge.className = "whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-bold tracking-wider bg-blue-100 text-brandBlue shadow-sm animate-pulse inline-block"; }

  function formatToDDMMYYYY(dateObj) {
    if (!(dateObj instanceof Date) || isNaN(dateObj)) return "-";
    var day = ("0" + dateObj.getDate()).slice(-2);
    var month = ("0" + (dateObj.getMonth() + 1)).slice(-2);
    var year = dateObj.getFullYear();
    return day + "/" + month + "/" + year;
  }

    } else { 
      badge.innerText = "⚪ ไม่พบข้อมูล"; 
      badge.className = "whitespace-nowrap px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold tracking-wider bg-gray-200 text-gray-600 shadow-sm inline-block"; 
    }
    
    var pmIntervalDays = 0;
    if (data.interval) {
      var match = String(data.interval).match(/\d+/); 
      if (match) pmIntervalDays = parseInt(match[0]);
    }
    intervalDisp.innerText = pmIntervalDays > 0 ? (pmIntervalDays + " วัน") : "ไม่ระบุ"; 
    
    var baseDateObj = null;
    if(data.lastPM && data.lastPM !== "-" && data.lastPM !== "") {
      var parsedDate = new Date(data.lastPM);
      if(isNaN(parsedDate.getTime())) {
        var parts = String(data.lastPM).split('/');
        if(parts.length === 3) parsedDate = new Date(parts[2] + "/" + parts[1] + "/" + parts[0]);
      }
      if(!isNaN(parsedDate.getTime())) {
        baseDateObj = parsedDate; lastDisp.innerText = formatToDDMMYYYY(baseDateObj);
      } else { lastDisp.innerText = String(data.lastPM); baseDateObj = new Date(); }
    } else { lastDisp.innerText = "ไม่มีประวัติ (เริ่มนับวันนี้)"; baseDateObj = new Date(); }

    if (baseDateObj && pmIntervalDays > 0) {
      var nextDateObj = new Date(baseDateObj.getTime()); 
      nextDateObj.setDate(nextDateObj.getDate() + pmIntervalDays); 
      nextInput.value = formatToDDMMYYYY(nextDateObj); 
    } else if (data.nextPM) { nextInput.value = data.nextPM; } 
    else { nextInput.value = "ไม่ระบุ"; }
  }

  function getFastThumbnailUrl(originalUrl) {
    if (!originalUrl) return "";
    var match = originalUrl.match(/id=([^&]+)/) || originalUrl.match(/file\/d\/([^\/]+)/);
    if (match && match[1]) { return "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w400"; }
    return originalUrl;
  }

  function fetchAssetPreview(assetStr, prefix) {
    if (!prefix) prefix = 'tf'; 
    var container = document.getElementById(prefix + 'PreviewContainer');
    var placeholder = document.getElementById(prefix + 'PreviewPlaceholder');
    var text = document.getElementById(prefix + 'PreviewText');
    var img = document.getElementById(prefix + 'PreviewImg');

    if(!container || !placeholder || !text || !img) return;

    if(!assetStr) {
      container.className = "mt-3 w-full border border-dashed border-gray-300 bg-gray-50 rounded-xl flex flex-col items-center justify-center overflow-hidden transition-all duration-500 h-20 shadow-sm";
      placeholder.classList.remove('hidden'); img.classList.add('hidden'); text.innerText = "รอโหลดรูปภาพ...";
      return;
    }

    var realId = assetStr.split(' - ')[0].trim();
    var matchedAsset = assetMasterList.find(function(a) { return a.id === realId; });

    if (matchedAsset && matchedAsset.imgUrl && !matchedAsset.imgUrl.startsWith("Error") && matchedAsset.imgUrl !== "ไม่ได้แนบไฟล์") {
      container.className = "mt-3 w-full border border-dashed border-blue-300 bg-blue-50/50 rounded-xl flex flex-col items-center justify-center overflow-hidden transition-all duration-500 h-20 shadow-sm";
      placeholder.classList.remove('hidden'); img.classList.add('hidden'); text.innerText = "กำลังจัดเตรียมรูปภาพ..."; text.className = "text-xs font-bold text-brandBlue tracking-wide";
      
      var fastImgUrl = getFastThumbnailUrl(matchedAsset.imgUrl);
      var fallbackTimer = setTimeout(function() {
        if(img.classList.contains('hidden')) { text.innerText = "รูปภาพมีขนาดใหญ่ หรือ สิทธิ์โฟลเดอร์ถูกปิดกั้น"; text.className = "text-[10px] font-medium text-orange-500 tracking-wide text-center px-2"; placeholder.classList.remove('animate-pulse'); }
      }, 5000);

      img.src = fastImgUrl;
      img.onload = function() { clearTimeout(fallbackTimer); placeholder.classList.add('hidden'); img.classList.remove('hidden'); container.className = "mt-3 w-full border-2 border-gray-100 bg-white rounded-xl flex flex-col items-center justify-center overflow-hidden transition-all duration-500 h-48 shadow-md"; };
      img.onerror = function() { clearTimeout(fallbackTimer); text.innerText = "ไม่สามารถแสดงรูปภาพได้ (เช็คสิทธิ์โฟลเดอร์ Drive)"; text.className = "text-[10px] font-bold text-red-400 tracking-wide text-center px-2"; placeholder.classList.remove('animate-pulse'); };
    } else {
      container.className = "mt-3 w-full border border-dashed border-gray-300 bg-gray-50 rounded-xl flex flex-col items-center justify-center overflow-hidden transition-all duration-500 h-20 shadow-sm";
      placeholder.classList.remove('hidden'); img.classList.add('hidden'); text.innerText = matchedAsset ? "สินทรัพย์นี้ไม่มีรูปภาพ" : "ไม่พบรหัสสินทรัพย์"; text.className = "text-xs font-medium text-gray-400 tracking-wide";
    }
  }

  function updateWizardUI() {
    for (var i = 1; i <= totalSteps; i++) { var stepEl = document.getElementById('step-' + i); if(stepEl) stepEl.classList.add('hidden'); } 
    var currStepEl = document.getElementById('step-' + currentStep); if(currStepEl) currStepEl.classList.remove('hidden');

      if(arr) { if (i === currentStep) { arr.classList.add('active-arrow'); arr.classList.remove('text-gray-300', 'text-brandBlue'); } else if (i < currentStep) { arr.classList.remove('active-arrow', 'text-gray-300'); arr.classList.add('text-brandBlue'); } else { arr.classList.remove('active-arrow', 'text-brandBlue'); arr.classList.add('text-gray-300'); } }
      if(ind) {

  async function captureTagBase64(formData) {
    return new Promise(async (resolve) => {
        var modal = document.getElementById('qrSuccessModal');
        modal.classList.remove('hidden');
        window.currentGeneratedAssetId = formData.assetId || "AST-Unknown";
        var pureQRData = formData.assetId; 
        
        var tempQrDiv = document.createElement('div');
        new QRCode(tempQrDiv, { text: pureQRData, width: 250, height: 250, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M });

        setTimeout(async () => {
            var qrCanvas = tempQrDiv.querySelector('canvas');
            var qrBase64 = qrCanvas ? qrCanvas.toDataURL("image/png") : "";

            try { await document.fonts.load(`bold 24px 'Noto Sans Thai'`); } catch(e) {}

            var tagCanvas = document.getElementById('assetTagCanvasDraw');
            var ctx = tagCanvas.getContext('2d');
            const w = tagCanvas.width;   
            const h = tagCanvas.height;  
            const navy = "#06245C";
            const fontName = "'Noto Sans Thai', sans-serif";

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = "#D1D5DB"; 
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, w - 2, h - 2);

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.roundRect(2, 2, w - 4, h - 4, 30);
            ctx.fill();

            ctx.fillStyle = navy;
            ctx.beginPath();
            ctx.roundRect(12, 12, w - 24, 130, 8);
            ctx.fill();

            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.font = `bold 55px ${fontName}`;
            ctx.fillText("T | H | A", w / 2, 85);

            ctx.font = `bold 24px ${fontName}`;
            ctx.textAlign = "left";
            ctx.fillText("Asset Tag No.", 40, 125);
            ctx.textAlign = "right";
            ctx.fillText(formData.assetId || "-", w - 40, 125);

            const qrImg = new Image();
            qrImg.src = qrBase64;
            qrImg.onload = () => {
                ctx.drawImage(qrImg, w / 2 - 110, 180, 220, 220); 

                ctx.fillStyle = "#A5A5A5";
                ctx.textAlign = "center";
                ctx.font = `400 18px ${fontName}`;
                ctx.fillText("Property of THA Asset Management", w / 2, 430);

                let formattedInstallDate = formData.installDate || "-";
                if (formattedInstallDate.indexOf('-') > -1 && formattedInstallDate.length === 10) {
                    let parts = formattedInstallDate.split('-');
                    formattedInstallDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                }

                const listItems = [
                    { label: "Item Name :", value: formData.productName || "-" },
                    { label: "Model :", value: formData.model || "-" },
                    { label: "S/N :", value: formData.serialNumber || "-" },
                    { label: "Location :", value: formData.location || "-" },
                    { label: "Install date :", value: formattedInstallDate } 
                ];

                let startY = 510;
                const rowHeight = 70;

                listItems.forEach((item, index) => {
                    const y = startY + (index * rowHeight);
                    ctx.textAlign = "left";
                    ctx.fillStyle = navy;
                    ctx.font = `bold 24px ${fontName}`;
                    ctx.fillText(item.label, 40, y);

                    ctx.textAlign = "right";
                    ctx.fillStyle = "#1a1a1a";
                    
                    let valText = item.value;
                    let maxTextWidth = 260; 
                    
                    ctx.font = `500 24px ${fontName}`;
                    
                    if (ctx.measureText(valText).width <= maxTextWidth) {
                        ctx.fillText(valText, w - 40, y);
                    } else {
                        ctx.font = `500 20px ${fontName}`; 
                        let line1 = "";
                        let line2 = "";
                        
                        for (let i = 0; i < valText.length; i++) {
                            let testLine = line1 + valText[i];
                            if (ctx.measureText(testLine).width > maxTextWidth) {
                                line2 = valText.substring(i);
                                break;
                            } else {
                                line1 = testLine;
                            }
                        }
                        
                        if (ctx.measureText(line2).width > maxTextWidth) {
                            let tempLine2 = "";
                            for (let i = 0; i < line2.length; i++) {
                                let testLine2 = tempLine2 + line2[i] + "...";
                                if (ctx.measureText(testLine2).width > maxTextWidth) break;
                                tempLine2 += line2[i];
                            }
                            line2 = tempLine2 + "...";
                        }
                        
                        ctx.fillText(line1, w - 40, y - 12); 
                        ctx.fillText(line2, w - 40, y + 12); 
                    }

                    ctx.strokeStyle = "#E8E8E8";
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(40, y + 15);
                    ctx.lineTo(w - 40, y + 15);
                    ctx.stroke();
                });

                var dataUrl = tagCanvas.toDataURL('image/jpeg', 1.0);
                var base64Only = dataUrl.split(',')[1];
                resolve(base64Only);
            };
            
            qrImg.onerror = () => { resolve(null); }
        }, 150); 
    });
  }

function handleDateInput(inputEl) {
  const container = inputEl.parentElement;
  const clearBtn = container.querySelector('[id$="ClearBtn"]');
  
  if (inputEl.value !== '') {
    inputEl.classList.add('has-value');
    if (clearBtn) clearBtn.classList.remove('hidden');
  } else {
    inputEl.classList.remove('has-value');
    if (clearBtn) clearBtn.classList.add('hidden');
  }
}

function toggleDateIcons(inputEl, isActive) {
  const container = inputEl.parentElement;
  const calIcon = container.querySelector('[id$="CalIcon"]');
  const chevIcon = container.querySelector('[id$="ChevronIcon"]');
  
  if (isActive) {
    if (calIcon) calIcon.classList.add('hidden');
    if (chevIcon) chevIcon.classList.remove('hidden');
  } else {
    setTimeout(() => {
      if (calIcon) calIcon.classList.remove('hidden');
      if (chevIcon) chevIcon.classList.add('hidden');
    }, 200); 
  }
}

function clearDateInput(btnEl, inputId) {

}

  // 🟢 ฟังก์ชันส่งข้อมูล GMRL แบบใหม่ (แก้ไขปัญหาข้อ 1-6)
  async function submitGmrlForm() {
      // ⚡ ฟังก์ชันเล็กๆ แปลงวันที่จาก "YYYY-MM-DD" ให้เป็น "DD/MM/YYYY" ก่อนส่งลงชีต (แก้ปัญหา 1, 2)
      const formatToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '';
          const parts = dateStr.split('-');
          return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : dateStr;
      };

      // ⚡ ฟังก์ชันแปลงไฟล์เป็น Object {base64, name, mimeType} เพื่อส่งให้ Upload_Sys.gs (แก้ปัญหา 5, 6)
      const processFileForUpload = (inputId) => {
          return new Promise((resolve) => {
              const el = document.getElementById(inputId);
              if (el && el.files.length > 0) {
                  const file = el.files[0];
                  const reader = new FileReader();
                  reader.onload = () => resolve({
                      base64: reader.result.split(',')[1], // ตัด header data:image... ทิ้ง
                      name: file.name,
                      mimeType: file.type
                  });
                  reader.readAsDataURL(file);
              } else {
                  resolve(null);
              }
          });
      };

      Swal.fire({ 
          title: 'บันทึกประวัติ GMRL?', 
          icon: 'question', 
          showCancelButton: true, 
          confirmButtonColor: '#2563eb', 
          cancelButtonColor: '#94a3b8', 
          confirmButtonText: 'ยืนยัน', 
          cancelButtonText: 'ยกเลิก', 
          customClass: { popup: 'rounded-3xl' }, 
          reverseButtons: true 
      }).then(async function(result) {
          if (result.isConfirmed) {
              if(typeof showLoadingAlert === 'function') showLoadingAlert('กำลังบันทึกข้อมูลซ่อมบำรุง...', 'upload'); 
              
              try {
                  // แพ็กเกจข้อมูลส่งหลังบ้านทั้งหมด
                  var formData = {
                      // ดึงมาแล้วสลับเป็น DD/MM/YYYY
                      startDate: formatToDDMMYYYY(document.getElementById('gmrlDate') ? document.getElementById('gmrlDate').value : ''),
                      endDate: formatToDDMMYYYY(document.getElementById('gmrlEndDate') ? document.getElementById('gmrlEndDate').value : ''),
                      
                      category: getDropdownVal('gmrlCategory', 'new_gmrlCategory'),
                      type: document.getElementById('gmrlType') ? document.getElementById('gmrlType').value : '', // แก้ข้อ 3
                      location: document.getElementById('gmrlLocation') ? document.getElementById('gmrlLocation').value : '',
                      details: document.getElementById('gmrlDetails') ? document.getElementById('gmrlDetails').value : '',
                      
                      // แก้ข้อ 4: ถ้าช่องราคาว่าง ให้ส่ง "" (ค่าว่าง) แทนที่ระบบจะแอบส่ง 0
                      cost: document.getElementById('gmrlCost') && document.getElementById('gmrlCost').value !== '' ? document.getElementById('gmrlCost').value : '',
                      
                      technician: getDropdownVal('gmrlTechnician', 'new_gmrlTechnician'),
                      issuer: getDropdownVal('gmrlIssuer', 'new_gmrlIssuer'),
                      remarks: document.getElementById('gmrlRemarks') ? document.getElementById('gmrlRemarks').value : ''
                  };

                  // อัปโหลดไฟล์ให้อยู่ใน Format ที่ Upload_Sys.gs รอรับ
                  formData.gmrlImage = await processFileForUpload('gmrlImage');
                  formData.gmrlDocument = await processFileForUpload('gmrlDocument');

                  // ส่งไปฟังก์ชัน saveGmrlData หลังบ้าน
                  google.script.run.withSuccessHandler(function(res) {
                      if(res && res.success) {
                          if(typeof speakAI === 'function') speakAI('บันทึกข้อมูลซ่อมบำรุงเรียบร้อยแล้วค่ะ');
                          Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'บันทึกข้อมูลลง GMRL เรียบร้อยแล้ว', customClass: { popup: 'rounded-3xl' } }).then(function() { 
                              // สั่งล้างฟอร์มทั้งหมด
                              var form = document.getElementById('gmrlForm');
                              if(form) form.reset();
                              if(typeof clearFile === 'function') { clearFile('gmrlImage'); clearFile('gmrlDocument'); }
                              
                              ['gmrlCategory', 'gmrlTechnician', 'gmrlIssuer'].forEach(id => {
                                  if(typeof clearSmartDropdown === 'function') clearSmartDropdown(id);
                              });
                              
                              // ดึงคลื่น Label ลงมาที่เดิม
                              document.querySelectorAll('#gmrlForm .wave-input').forEach(el => {
                                  el.classList.remove('has-value');
                                  if(el.tagName === 'TEXTAREA') el.style.height = '';
                              });
                          });
                      } else {
                          Swal.fire({ icon: 'error', title: 'ผิดพลาด!', text: res ? res.message : 'เกิดข้อผิดพลาดในการบันทึก' });
                      }
                  }).withFailureHandler(function(err) {
                      Swal.fire({ icon: 'error', title: 'การเชื่อมต่อล้มเหลว!', text: err.message });
                  }).saveGmrlData(formData); 
                  
              } catch(e) {

// 🔵 6. ระบบวาดรายการ Rich Card (UI Rendering - อัปเดตโชว์ Location จาก Col H)

    const list = document.getElementById('reprintCustomList');

    list.innerHTML = '';
    
    if(data.length === 0) {
        list.innerHTML = '<li class="p-4 text-center text-gray-400 font-medium italic">ไม่พบข้อมูลสินทรัพย์...</li>';

    data.forEach(item => {
        let li = document.createElement('li');
        li.className = "p-3 border-b border-blue-50 hover:bg-blue-100 cursor-pointer transition-all active:bg-blue-200";
        
        li.onclick = (e) => {

// 📌 ฟังก์ชันสั่งการ (แก้ปัญหาโหลดแว๊บแล้วหาย)
async function generateReprintTag() {
    let searchVal = document.getElementById('reprintSearchInput').value;
    if(!searchVal) return Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาค้นหาและเลือกสินทรัพย์ก่อนครับ' });

    let targetAssetId = searchVal.split(' : ')[0].trim();
    let assetObj = globalAssetDataForReprint.find(a => a.assetId === targetAssetId);

    if(!assetObj) return Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูล', text: 'ไม่พบข้อมูลในระบบ' });

    showLoadingAlert('S.A.M. กำลังวาดป้าย Tag...', 'upload'); 
    
    try {
        // วาดป้ายเงียบๆ เป็น Background
        await captureReprintTagBase64(assetObj);
        
        // พอวาดเสร็จ ปิดหน้าโหลด
        Swal.close(); 
        
        // 🌟 สั่งเด้งหน้าต่างโชว์รูปอย่างสง่างาม (แก้ปัญหา opacity-0 ล่องหน)
        let modal = document.getElementById('qrSuccessModal');
        let content = document.getElementById('qrModalContent');
        if(modal) {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100'); // บังคับให้แสดงตัว
                if(content) {
                    content.classList.remove('scale-95');
                    content.classList.add('scale-100'); // อนิเมชันซูมเข้า
                }
            }, 50);
        }
    } catch (error) {
        Swal.close();
        Swal.fire({ icon: 'error', title: 'วาดป้ายล้มเหลว', text: error.message });
    }
}

// 📌 เครื่องยนต์วาดรูป (แยกมาเฉพาะ Reprint ไม่ยุ่งกับของเดิม)
async function captureReprintTagBase64(formData) {
    return new Promise((resolve, reject) => {
        try {
            window.currentGeneratedAssetId = formData.assetId || "AST-Unknown";
            var tempQrDiv = document.createElement('div');
            new QRCode(tempQrDiv, { text: formData.assetId, width: 250, height: 250, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M });

            setTimeout(async () => {
                var qrCanvas = tempQrDiv.querySelector('canvas');
                var qrBase64 = qrCanvas ? qrCanvas.toDataURL("image/png") : "";

                try { await document.fonts.load(`bold 24px 'Noto Sans Thai'`); } catch(e) {}

                var tagCanvas = document.getElementById('assetTagCanvasDraw');
                if(!tagCanvas) throw new Error("ไม่พบกระดานวาดรูป Canvas");
                
                var ctx = tagCanvas.getContext('2d');
                const w = tagCanvas.width;   
                const h = tagCanvas.height;  
                const navy = "#06245C";
                const fontName = "'Noto Sans Thai', sans-serif";

                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, w, h);
                ctx.strokeStyle = "#D1D5DB"; 
                ctx.lineWidth = 2;
                ctx.strokeRect(1, 1, w - 2, h - 2);
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.roundRect(2, 2, w - 4, h - 4, 30);
                ctx.fill();
                ctx.fillStyle = navy;
                ctx.beginPath();
                ctx.roundRect(12, 12, w - 24, 130, 8);
                ctx.fill();

                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "center";
                ctx.font = `bold 55px ${fontName}`;
                ctx.fillText("T | H | A", w / 2, 85);
                ctx.font = `bold 24px ${fontName}`;
                ctx.textAlign = "left";
                ctx.fillText("Asset Tag No.", 40, 125);
                ctx.textAlign = "right";
                ctx.fillText(formData.assetId || "-", w - 40, 125);

                const qrImg = new Image();
                qrImg.src = qrBase64;
                qrImg.onload = () => {
                    ctx.drawImage(qrImg, w / 2 - 110, 180, 220, 220); 
                    ctx.fillStyle = "#A5A5A5";
                    ctx.textAlign = "center";
                    ctx.font = `400 18px ${fontName}`;
                    ctx.fillText("Property of THA Asset Management", w / 2, 430);

                    let installDate = formData.installDate || "-";
                    if (installDate.indexOf('-') > -1 && installDate.length === 10) {
                        let parts = installDate.split('-');
                        installDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                    }

                    const listItems = [
                        { label: "Item Name :", value: formData.productName || "-" },
                        { label: "Model :", value: formData.model || "-" },
                        { label: "S/N :", value: formData.serialNumber || "-" },
                        { label: "Location :", value: formData.location || "-" },
                        { label: "Install date :", value: installDate } 
                    ];

                    let startY = 510;
                    const rowHeight = 70;

                    listItems.forEach((item, index) => {
                        const y = startY + (index * rowHeight);
                        ctx.textAlign = "left";
                        ctx.fillStyle = navy;
                        ctx.font = `bold 24px ${fontName}`;
                        ctx.fillText(item.label, 40, y);

                        ctx.textAlign = "right";
                        ctx.fillStyle = "#1a1a1a";
                        let valText = item.value;
                        let maxTextWidth = 260; 
                        
                        ctx.font = `500 24px ${fontName}`;
                        if (ctx.measureText(valText).width <= maxTextWidth) {
                            ctx.fillText(valText, w - 40, y);
                        } else {
                            ctx.font = `500 20px ${fontName}`; 
                            let line1 = "", line2 = "";
                            for (let i = 0; i < valText.length; i++) {
                                let testLine = line1 + valText[i];
                                if (ctx.measureText(testLine).width > maxTextWidth) {
                                    line2 = valText.substring(i);
                                    break;
                                } else { line1 = testLine; }
                            }
                            if (ctx.measureText(line2).width > maxTextWidth) {
                                let tempLine2 = "";
                                for (let i = 0; i < line2.length; i++) {
                                    let testLine2 = tempLine2 + line2[i] + "...";
                                    if (ctx.measureText(testLine2).width > maxTextWidth) break;
                                    tempLine2 += line2[i];
                                }
                                line2 = tempLine2 + "...";
                            }
                            ctx.fillText(line1, w - 40, y - 12); 
                            ctx.fillText(line2, w - 40, y + 12); 
                        }
                        ctx.strokeStyle = "#E8E8E8";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(40, y + 15);
                        ctx.lineTo(w - 40, y + 15);
                        ctx.stroke();
                    });
                    resolve(true);
                };
                qrImg.onerror = () => { resolve(true); } // เผื่อ QR พลาด ก็ยังข้ามไปวาดตัวหนังสือได้
            }, 200); 
        } catch(error) {
            reject(error);
        }
    });
}

// 🔵 1. ฟังก์ชันสั่ง เปิด/ปิด รายการ (Toggle)
function toggleReprintList(event) {
    if(event) event.stopPropagation();
    const container = document.getElementById('reprintListContainer');
    const chevron = document.getElementById('reprintChevron');
    
    if (container.classList.contains('hidden')) {
        container.classList.remove('hidden');
        if(chevron) chevron.style.transform = 'rotate(180deg)';
    } else {
        hideReprintList();
    }
}

// 🔵 2. ฟังก์ชันสั่งซ่อนรายการ (Core Hide)
function hideReprintList() {
    const container = document.getElementById('reprintListContainer');
    const chevron = document.getElementById('reprintChevron');
    if(container) container.classList.add('hidden');
    if(chevron) chevron.style.transform = 'rotate(0deg)';
}

// 🔵 3. ระบบตรวจสอบคลิกข้างนอก (Global Click Outside)
document.addEventListener('mousedown', function(e) {
    const containerOuter = document.getElementById('reprintSearchContainerOuter');
    // ถ้าคลิกนอกพื้นที่ช่องค้นหา ให้สั่งหดรายการเก็บทันที
    if (containerOuter && !containerOuter.contains(e.target)) {
        hideReprintList();
    }
});

// 🔵 4. ฟังก์ชันล้างค่าช่องค้นหา (Clear Search)
function clearReprintSearch(event) {
    if(event) event.stopPropagation();
    const input = document.getElementById('reprintSearchInput');
    input.value = '';
    document.getElementById('clearReprintBtn').classList.add('hidden');
    renderReprintList(globalAssetDataForReprint);
    hideReprintList(); // ล้างเสร็จให้หดเก็บ
    input.focus();
}

// 🔵 5. ระบบกรองข้อมูล (Filter Logic)
function filterReprintList(val) {
    const clearBtn = document.getElementById('clearReprintBtn');
    const container = document.getElementById('reprintListContainer');
    const chevron = document.getElementById('reprintChevron');

    if(val) {
        clearBtn.classList.remove('hidden');
    } else {
        clearBtn.classList.add('hidden');
    }
    
    // พิมพ์แล้วให้เด้งรายการออกมาทันที
    if(container) container.classList.remove('hidden');
    if(chevron) chevron.style.transform = 'rotate(180deg)';
    
    let lower = val.toLowerCase();
    let filtered = globalAssetDataForReprint.filter(item => 
        item.assetId.toLowerCase().includes(lower) || 
        item.productName.toLowerCase().includes(lower) ||
        (item.serialNumber && item.serialNumber.toLowerCase().includes(lower))
    );
    renderReprintList(filtered);
}

// 🔵 6. ระบบวาดรายการ Rich Card (UI Rendering)
function renderReprintList(data) {
    const list = document.getElementById('reprintCustomList');
    if(!list) return;
    
    list.innerHTML = '';
    
    if(data.length === 0) {
        list.innerHTML = '<li class="p-4 text-center text-gray-400 font-medium italic">ไม่พบข้อมูลสินทรัพย์...</li>';
        return;
    }

    data.forEach(item => {
        let li = document.createElement('li');
        li.className = "p-3 border-b border-blue-50 hover:bg-blue-100 cursor-pointer transition-all active:bg-blue-200";
        
        // เมื่อเลือกรายการ
        li.onclick = (e) => {
            e.stopPropagation();
            const input = document.getElementById('reprintSearchInput');
            input.value = `${item.assetId} : ${item.productName}`;
            document.getElementById('clearReprintBtn').classList.remove('hidden');
            hideReprintList(); // เลือกเสร็จหดเก็บ

        li.innerHTML = `
            <div class="flex justify-between items-center mb-1">
                <span class="text-[#2563eb] font-black text-sm">${item.assetId}</span>

        if (hasValue) {

            xBtn?.classList.remove('hidden');
            qrBtn?.classList.remove('hidden');

                qrBtn?.classList.remove('hidden'); // ไม่ได้พิมพ์ = โชว์แสกน QR

// =========================================================
function handleSfAssetInput(el) {
    let val = el.value;
    
    // ดักจับ QR Dump: ถ้ามีขีดคั่น ' - ' หรือท่อ ' | ' และข้อความยาวเกินไป
    if ((val.includes(' - ') || val.includes(' | ')) && val.length > 10) {
        let separator = val.includes(' - ') ? ' - ' : ' | ';
        let idPart = val.split(separator)[0].trim(); // ดึงมาแค่รหัส เช่น "AST-012"
        
        // ค้นหาในฐานข้อมูลทันที
        let matchedItem = (window.assetMasterList || []).find(a => a.id.toLowerCase() === idPart.toLowerCase());
        
        if (matchedItem) {
            let matchedCat = "ถังดับเพลิง";
            const assetStr = `${matchedItem.name} ${matchedItem.category}`.toLowerCase();
            for (const [key, aliases] of Object.entries(safetyAliases)) {
                if (aliases.some(alias => assetStr.includes(alias.toLowerCase()))) {
                    matchedCat = key; break;
                }
            }
            matchedItem.matchedSafetyCat = matchedCat;
            
            // สั่งเลือกอัตโนมัติ แล้วจบการทำงาน!
            selectSfAsset(matchedItem);
            return; 
        }
    }

    // กรณีพิมพ์ปกติ
    el.style.height = 'auto'; 
    el.style.height = `${el.scrollHeight}px`;
    if(val.trim() !== '') { el.classList.add('has-value'); } 
    else { el.classList.remove('has-value'); }
    
    updateSfAssetButtonsState();
    renderSfAssetDropdown(val);
}

// =========================================================
function renderSfAssetDropdown(filterText) {
    let filterStr = (typeof filterText === 'string') ? filterText.toLowerCase().trim() : '';
    const dropdown = document.getElementById('sfAssetDropdown');
    const inputField = document.getElementById('sfAsset');
    if(!dropdown || !inputField) return;
    
    dropdown.innerHTML = '';
    const searchTerms = filterStr.split(/\s+/);
    
    const getCheckVal = (id) => {
        const el = document.getElementById(id);
        if (!el) return '';
        return (el.value === 'อื่นๆ' || el.value === 'other') ? (document.getElementById(`new_${id}_input`)?.value || '') : el.value;
    };

    const rawFloor = getCheckVal('sfFloor');
    const rawZone = getCheckVal('sfZone');
    
    const cleanFloor = rawFloor.split('[')[0].trim().toLowerCase();
    const cleanZone = rawZone.split('[')[0].trim().toLowerCase();

    const filtered = (window.assetMasterList || []).filter(a => {
        const assetStr = `${a.name || ''} ${a.category || ''}`.toLowerCase();
        let matchedCat = null;

        for (const [key, aliases] of Object.entries(safetyAliases)) {
            if (aliases.some(alias => assetStr.includes(alias.toLowerCase()))) {
                matchedCat = key; break;
            }
        }
        if (!matchedCat) return false;

        const aLoc = (a.location || '').toLowerCase();
        
        // 🌟 Smart Filter: ถ้าชั้นไม่ตรง ตัดทิ้งเลย
        if (cleanFloor && !aLoc.includes(cleanFloor)) return false;
        
        // 🌟 Smart Filter: โซนยืดหยุ่นขึ้น
        if (cleanZone && aLoc.includes('โซน') && !aLoc.includes(cleanZone)) return false;

        const fullString = `${a.id || ''} ${a.name || ''} ${a.category || ''} ${a.location || ''}`.toLowerCase();
        a.matchedSafetyCat = matchedCat; 

        return searchTerms.every(term => fullString.includes(term));
    });

    if(filtered.length === 0) {
        dropdown.innerHTML = '<li class="p-4 text-sm font-medium text-gray-500 text-center">❌ ไม่พบข้อมูลอุปกรณ์ <br><span class="text-xs text-gray-400">โปรดตรวจสอบรหัส หรือพิมพ์ชื่อให้ถูกต้อง</span></li>';
    } else {
        filtered.forEach(item => {
            const li = document.createElement('li');
            li.className = 'p-3 hover:bg-blue-50 cursor-pointer transition-colors border-b border-gray-100 last:border-b-0 group';
            li.innerHTML = `
                <div class="flex flex-col gap-1 w-full">
                    <div class="flex justify-between items-start w-full">
                        <span class="font-bold text-sm text-brandBlue group-hover:text-blue-700 transition-colors">${item.id}</span>
                        <span class="text-[10px] font-bold bg-blue-50 text-brandBlue px-2 py-0.5 rounded-full border border-blue-200 shadow-sm">${item.location || 'ไม่ระบุจุด'}</span>
                    </div>
                    <span class="text-sm font-semibold text-gray-800 leading-tight">${item.name}</span>

                </div>
            `;
            li.onclick = () => selectSfAsset(item);
            dropdown.appendChild(li);
        });
    }
    dropdown.classList.remove('hidden');
}

function selectSfAsset(item) {
    const inputField = document.getElementById('sfAsset');
    if (!inputField) return;

    inputField.value = `${item.id} | ${item.name}`;
    inputField.classList.add('has-value');
    inputField.dataset.category = item.matchedSafetyCat || item.category; 
    inputField.style.height = 'auto'; 
    inputField.style.height = `${inputField.scrollHeight}px`;
    
    updateSfAssetButtonsState();
    document.getElementById('sfAssetDropdown')?.classList.add('hidden'); 
    
    if (typeof fetchAssetPreview === 'function') fetchAssetPreview(item.id, 'sfAsset'); 
    generateSafetyChecklist(item.matchedSafetyCat || item.category);
}

function toggleSfAssetDropdown() {
    const dropdown = document.getElementById('sfAssetDropdown');
    const inputField = document.getElementById('sfAsset');
    if (dropdown) {
        if (dropdown.classList.contains('hidden')) { 
            renderSfAssetDropdown(inputField ? inputField.value : ''); 
            if(inputField) inputField.focus();

function generateSafetyChecklist(cat) {
    let matchedCat = "ถังดับเพลิง"; 
    for (const key in safetyDictionary) {
        if (cat.includes(key) || key.includes(cat)) { matchedCat = key; break; }
    }

    const questions = safetyDictionary[matchedCat];
    const itemsDiv = document.getElementById('checklistItems');
    sfCurrentStatus = new Array(questions.length).fill(null);
    
    itemsDiv.innerHTML = questions.map((q, i) => `
        <div id="checklistItem_${i}" class="flex items-center justify-between p-3 sm:p-4 bg-white border-2 border-gray-100 rounded-2xl sm:rounded-3xl shadow-sm transition-all duration-300 gap-3">
            <div class="flex flex-col gap-1 flex-1 min-w-0 pr-2">
                <span class="text-[10px] font-black text-brandBlue uppercase tracking-tighter opacity-50">Checklist ${i + 1}</span>
                <span class="text-[13px] sm:text-sm font-bold text-gray-800 leading-snug break-words whitespace-normal">${q}</span>
            </div>
            <div class="flex gap-2 justify-end items-center flex-shrink-0">
                <button type="button" id="btnPass_${i}" onclick="answerChecklist(${i}, true)" 
                    class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-[12px] sm:rounded-[14px] border-2 border-gray-100 bg-white shadow-sm text-gray-300 transition-all active:scale-95">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </button>
                <button type="button" id="btnFail_${i}" onclick="answerChecklist(${i}, false)" 
                    class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-[12px] sm:rounded-[14px] border-2 border-gray-100 bg-white shadow-sm text-gray-300 transition-all active:scale-95">

document.addEventListener('DOMContentLoaded', function() {
    const fileInput = document.getElementById('sfImage');
    if(fileInput) {
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const clearBtn = document.getElementById('sfClearImageBtn');
            const previewImg = document.getElementById('sfUploadPreviewImg');
            const placeholder = document.getElementById('sfUploadPreviewPlaceholder');

            if (file) {
                if(clearBtn) clearBtn.classList.remove('hidden');
                const reader = new FileReader();
                reader.onload = function(evt) {
                    if(previewImg) { previewImg.src = evt.target.result; previewImg.classList.remove('hidden'); }
                    if(placeholder) placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            } else { clearSfUploadImage(); }
        });
    }
});

function clearSfUploadImage() {
    const fileInp = document.getElementById('sfImage');
    const clearBtn = document.getElementById('sfClearImageBtn');
    const previewImg = document.getElementById('sfUploadPreviewImg');
    const placeholder = document.getElementById('sfUploadPreviewPlaceholder');
    const expandBtn = document.getElementById('sfExpandUploadImgBtn'); // 🌟 เพิ่มบรรทัดนี้

    if(clearBtn) clearBtn.classList.add('hidden');
    if(expandBtn) expandBtn.classList.add('hidden'); // 🌟 ซ่อนปุ่มขยาย
    if(previewImg) { previewImg.src = ''; previewImg.classList.add('hidden'); }
    if(placeholder) placeholder.classList.remove('hidden');
}

// --- 🛡️ ฟังก์ชันส่งข้อมูล ---
async function submitSafetyForm() {
    const btn = document.getElementById('sfSubmitBtn');
    if (!btn) return;

    btn.disabled = true;
    if (typeof showLoadingAlert === 'function') { showLoadingAlert('S.A.M. กำลังประมวลผลข้อมูล...', 'upload'); }

    try {
        const assetInp = document.getElementById('sfAsset');
        let category = assetInp?.dataset.category || "ถังดับเพลิง";
        
        let matchedCat = "ถังดับเพลิง"; 
        for (const key in safetyDictionary) { if (category.includes(key) || key.includes(category)) { matchedCat = key; break; } }
        const questions = safetyDictionary[matchedCat];

        const detailedResults = sfCurrentStatus.map((status, i) => {
            const icon = status ? '✅ Pass' : '❌ Fail';
            return `${icon} | ${questions[i]}`;
        }).join('\n');

        let rawAsset = assetInp?.value || "ไม่ระบุอุปกรณ์";
        let formattedAssetName = rawAsset;

        if (rawAsset.includes('|') || rawAsset.includes(' - ')) {
            let separator = rawAsset.includes('|') ? '|' : ' - ';
            let parts = rawAsset.split(separator).map(p => p.trim());
            if (parts.length === 2) {
                let isPart0_ID = /^[A-Za-z0-9]/.test(parts[0]);
                let isPart1_ID = /^[A-Za-z0-9]/.test(parts[1]);
                if (isPart1_ID && !isPart0_ID) { formattedAssetName = `${parts[1]} | ${parts[0]}`; } 
                else { formattedAssetName = `${parts[0]} | ${parts[1]}`; }
            }
        }

        const getSmartValue = (id) => {
            const mainVal = document.getElementById(id)?.value;
            if (mainVal === 'อื่นๆ' || mainVal === 'other') return document.getElementById(`new_${id}_input`)?.value || "ไม่ระบุ";
            return mainVal || "ไม่ระบุ";
        };

        const formData = {
            floor: getSmartValue('sfFloor'),
            zone: getSmartValue('sfZone'),
            inspector: getSmartValue('sfInspector'),
            assetName: formattedAssetName, 
            category: matchedCat,
            checklistData: detailedResults,
            severity: document.querySelector('input[name="severity"]:checked')?.value || "1",
            remarks: document.getElementById('sfRemarks')?.value || "",
            createGmrl: document.getElementById('sfCreateGmrl')?.checked || false
        };

        const imgInput = document.getElementById('sfImage');
        if (imgInput?.files && imgInput.files.length > 0 && typeof readFileAsBase64 === 'function') {
            formData.sfImage = await readFileAsBase64(imgInput.files[0]);
        }

        google.script.run
            .withSuccessHandler(res => {
                btn.disabled = false;
                if (res.success) {
                    if (typeof speakAI === 'function') { speakAI(res.isGmrlCreated ? "ส่งรายงานและแจ้งซ่อมเรียบร้อยค่ะ" : "บันทึกผลการตรวจสอบเรียบร้อยค่ะ"); }
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', text: res.message, customClass: { popup: 'rounded-3xl' } }).then(() => {
                        document.getElementById('safetyForm').reset();
                        if (typeof clearSfAsset === 'function') clearSfAsset();
                    });
                } else { Swal.fire('Error', res.message, 'error'); }
            })
            .withFailureHandler(err => {
                btn.disabled = false;
                Swal.fire('Server Error', err.message, 'error');
            })
            .saveSafetyAuditData(formData);

    } catch (e) {
        btn.disabled = false;
        Swal.fire('Error', e.message, 'error');
    }
}


function checkFinalStatus() {
    const evidenceBox = document.getElementById('evidenceContainer');
    const submitBtn = document.getElementById('sfSubmitBtn');
    
    const isAllAnswered = sfCurrentStatus.length > 0 && sfCurrentStatus.every(val => val !== null);
    const hasFail = sfCurrentStatus.includes(false);

    if (isAllAnswered) {
        submitBtn.disabled = false;
        submitBtn.className = "w-full btn-gradient text-white rounded-2xl px-6 py-4 font-bold text-lg flex justify-center items-center gap-2 transition-all transform active:scale-95 shadow-xl animate-fadeIn";
        if (hasFail) { evidenceBox.classList.remove('hidden'); } else { evidenceBox.classList.add('hidden'); }
    } else {
        submitBtn.disabled = true;
        submitBtn.className = "w-full bg-gray-300 text-gray-500 rounded-2xl px-6 py-4 font-bold text-lg flex justify-center items-center gap-2 transition-all shadow-none cursor-not-allowed";
        evidenceBox.classList.add('hidden');
    }
}

function checkAutoGmrl() {
    const severity = document.querySelector('input[name="severity"]:checked')?.value;
    const toggleBox = document.getElementById('autoGmrlToggle');
    if (severity === "3" || severity === "4") {
        if(toggleBox) toggleBox.classList.remove('hidden');
    } else {
        if(toggleBox) toggleBox.classList.add('hidden');
    }
}

                <h4 class="text-base font-bold text-brandDark mt-1 leading-tight">${topicText}</h4>
            </div>
            <button type="button" id="rtExpandBtn_${cardId}" onclick="rtToggleCard(${cardId})" class="hidden w-8 h-8 bg-blue-50 text-brandBlue rounded-full flex items-center justify-center transition-all z-20 shadow-sm border border-blue-100">
                <svg class="w-5 h-5 transition-transform duration-300 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>

        <div id="rtCardBody_${cardId}" class="transition-all duration-500 opacity-100">
            <div class="flex gap-2 mb-4">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="rtStatus_${cardId}" value="🟢 ปกติ" class="peer sr-only" onchange="rtCheckReadyToSave(${cardId})">
                    <div class="text-center py-2 px-1 rounded-xl border-2 border-gray-100 text-gray-400 font-bold text-xs peer-checked:bg-green-50 peer-checked:border-green-400 peer-checked:text-green-600 transition-all">🟢 ปกติ</div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="rtStatus_${cardId}" value="🟠 แจ้งซ่อม/แก้ไข" class="peer sr-only" onchange="rtCheckReadyToSave(${cardId})">
                    <div class="text-center py-2 px-1 rounded-xl border-2 border-gray-100 text-gray-400 font-bold text-xs peer-checked:bg-orange-50 peer-checked:border-orange-400 peer-checked:text-orange-600 transition-all">🟠 แจ้งซ่อม</div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="rtStatus_${cardId}" value="🔴 ผิดปกติ" class="peer sr-only" onchange="rtCheckReadyToSave(${cardId})">
                    <div class="text-center py-2 px-1 rounded-xl border-2 border-gray-100 text-gray-400 font-bold text-xs peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-600 transition-all">🔴 ผิดปกติ</div>
                </label>
            </div>

            <div class="relative w-full flex items-center box-border mb-4">
                <input type="file" id="rtImage_${cardId}" accept="image/*" onchange="rtCheckReadyToSave(${cardId})" class="block w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:font-bold file:bg-blue-50 file:text-brandBlue border-2 border-gray-200 rounded-xl bg-white cursor-pointer transition-all">
            </div>

            <button type="button" id="rtSaveBtn_${cardId}" onclick="rtSaveSingleCard(${cardId})" disabled class="w-full bg-gray-200 text-gray-400 rounded-xl px-4 py-3 font-bold flex justify-center items-center gap-2 transition-all shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                บันทึกข้อมูลข้อนี้
            </button>
        </div>
        
        <div id="rtSuccessBadge_${cardId}" class="absolute inset-0 bg-green-50/90 backdrop-blur-sm z-10 hidden flex-col items-center justify-center text-green-600 font-bold">
            <svg class="w-10 h-10 mb-1 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            อัปโหลดสำเร็จ!
        </div>
    </div>`;

    container.insertAdjacentHTML('afterbegin', cardHTML);
    topicInput.value = ''; 
}

function rtCheckReadyToSave(cardId) {
    const statusObj = document.querySelector(`input[name="rtStatus_${cardId}"]:checked`);
    const imgObj = document.getElementById(`rtImage_${cardId}`);
    const saveBtn = document.getElementById(`rtSaveBtn_${cardId}`);

    if (statusObj && imgObj.files.length > 0) {
        saveBtn.disabled = false;
        saveBtn.className = "w-full bg-brandBlue hover:bg-blue-700 text-white rounded-xl px-4 py-3 font-bold flex justify-center items-center gap-2 transition-all shadow-md active:scale-95 cursor-pointer";
    } else {
        saveBtn.disabled = true;
        saveBtn.className = "w-full bg-gray-200 text-gray-400 rounded-xl px-4 py-3 font-bold flex justify-center items-center gap-2 transition-all shadow-sm cursor-not-allowed";
    }
}

function rtSaveSingleCard(cardId) {
    const card = document.getElementById(`rtCard_${cardId}`);
    const saveBtn = document.getElementById(`rtSaveBtn_${cardId}`);
    const statusVal = document.querySelector(`input[name="rtStatus_${cardId}"]:checked`).value;
    const imgFile = document.getElementById(`rtImage_${cardId}`).files[0];
    
    saveBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังอัปโหลด...`;
    saveBtn.disabled = true;

    // ระบบแปลงรูปเป็น Base64
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64Data = e.target.result.split(',')[1];
        
        // แพ็คเกจข้อมูลเตรียมส่งเข้า DB
        const payload = {
            action: 'saveRoutineItem',
            sessionId: currentRtSession,
            inspector: card.dataset.inspector,
            floor: card.dataset.floor,
            zone: card.dataset.zone,
            topic: card.dataset.topic,
            status: statusVal,
            fileName: imgFile.name,
            mimeType: imgFile.type,
            fileData: base64Data
        };

        // ยิงไปที่ Google Apps Script 
        google.script.run
            .withSuccessHandler(function(res) {
                // อัปโหลดสำเร็จ
                document.getElementById(`rtSuccessBadge_${cardId}`).classList.remove('hidden');
                document.getElementById(`rtSuccessBadge_${cardId}`).classList.add('flex');
                
                setTimeout(() => {
                    document.getElementById(`rtCardBody_${cardId}`).classList.add('hidden', 'opacity-0');
                    card.classList.replace('border-gray-200', 'border-green-400');
                    card.classList.replace('bg-white', 'bg-green-50/40');
                    document.getElementById(`rtExpandBtn_${cardId}`).classList.remove('hidden');
                    document.getElementById(`rtSuccessBadge_${cardId}`).classList.add('hidden');
                }, 1200);
            })
            .withFailureHandler(function(err) {
                saveBtn.innerHTML = `❌ เกิดข้อผิดพลาด ลองใหม่`;
                saveBtn.disabled = false;
                saveBtn.classList.replace('bg-brandBlue', 'bg-red-500');
            })
            .processRoutineUpload(payload); // เรียกฟังก์ชันฝั่ง .gs
    };
    reader.readAsDataURL(imgFile);
}

function rtToggleCard(cardId) {
    const cardBody = document.getElementById(`rtCardBody_${cardId}`);
    const svgIcon = document.querySelector(`#rtExpandBtn_${cardId} svg`);
    
    if(cardBody.classList.contains('hidden')) {
        cardBody.classList.remove('hidden');
        setTimeout(() => cardBody.classList.remove('opacity-0'), 50);
        svgIcon.classList.remove('rotate-180');
    } else {
        cardBody.classList.add('opacity-0');
        setTimeout(() => cardBody.classList.add('hidden'), 300);
        svgIcon.classList.add('rotate-180');
    }
}

function rtFinishPatrolSession() {
    if(!currentRtSession) {
        Swal.fire("แจ้งเตือน", "ยังไม่ได้เริ่มการเดินตรวจครับ", "info");
        return;
    }
    Swal.fire({
        title: "ปิดจบรอบการตรวจ?",
        text: `รหัสรอบ: ${currentRtSession}`,
        icon: "success",
        confirmButtonColor: "#06245C",
        confirmButtonText: "ตกลง"
    }).then(() => {
        document.getElementById('rtCardsContainer').innerHTML = '';
        currentRtSession = "";
        switchView('dashboard'); // เด้งกลับหน้าหลัก
    });
}
</script>
