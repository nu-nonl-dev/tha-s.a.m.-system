<script>
/**
 * =======================================================
 * REPORT SYSTEM FRONTEND (Phase 6 - Multi-Department UI)
 * ผสานระบบ UI ใหม่ รองรับรายงาน รปภ. และ แม่บ้าน (HK)
 * =======================================================
 */

let currentReportData = null;
let reportChartInstance = null; 

// 🟢 ฟังก์ชันหน้าต่างโหลดดิ้ง
function showLoadingAlert(msg, mode = 'download') { 
  const arrowPath = (mode === 'upload') 
    ? "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 13l3-3m0 0l3 3m-3-3v9" 
    : "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"; 

  Swal.fire({ 
    html: `
      <div class="flex flex-col items-center justify-center py-6">
        <div class="relative w-20 h-20 flex items-center justify-center mb-6">
          <div class="absolute inset-0 rounded-full border-t-4 border-[#04d4d4] animate-spin"></div>
          <div class="absolute inset-2 rounded-full border-r-4 border-blue-400 animate-spin" style="animation-direction: reverse;"></div>
          <svg class="w-10 h-10 text-[#04d4d4] relative z-10 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="${arrowPath}"></path>
          </svg>
        </div>
        <h3 class="text-xl font-black text-[#06245C] tracking-wide mb-2">${msg}</h3>
        <p class="text-[10px] text-blue-500 font-bold tracking-widest animate-pulse uppercase">S.A.M. Processing...</p>
      </div>
    `, 
    allowOutsideClick: false, 
    showConfirmButton: false, 
    customClass: { 
      container: 'z-[999999]', 
      popup: 'rounded-[2rem] shadow-2xl border border-gray-100 bg-white/95 backdrop-blur-xl' 
    } 
  }); 
}

// 🎯 ตัวแปรกลางสำหรับเก็บวันที่โหมดด่วน (Global Variables)
let instantStartDate = "";
let instantEndDate = "";

function openReportModal(mode, sessionId = null) {
  const modal = document.getElementById('reportModal');
  const filterForm = document.getElementById('reportFilterForm');
  
  resetReportUI();
  modal.classList.remove('hidden');
  
  if (mode === 'Instant' && sessionId) {
    filterForm.classList.add('hidden');
    
    // ตั้งค่าเบื้องต้น เช็คจาก Prefix ว่าเป็น HK หรือ RT
    let currentMode = 'Routine';
    if(sessionId.startsWith('HK-')) {
        currentMode = 'Routine_HK';
    }
    document.getElementById('reportType').value = currentMode;
    
    // 🎯 [พระเอกของเรา!] สั่งให้อัปเดตข้อความบนหน้า UI เป็น Hygiene Score ทันที
    if (typeof rtUpdateModalLabels === 'function') {
        rtUpdateModalLabels(currentMode);
    }
    
    // 🎯 [แก้บั๊กเด็ดขาด] สร้างวันที่ปัจจุบันและยัดลงไปในระบบทันที!
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const todayStr = `${yyyy}-${mm}-${dd}`; // ฟอร์แมตที่ Input Type Date ต้องการ
    
    instantStartDate = todayStr;
    instantEndDate = todayStr;
    
    const startInput = document.getElementById('startDate');
    const endInput = document.getElementById('endDate');
    if(startInput) { startInput.type = 'date'; startInput.value = todayStr; }
    if(endInput) { endInput.type = 'date'; endInput.value = todayStr; }

    if(typeof speakAI === 'function') speakAI("กำลังสรุปผลการทำงานรอบนี้ กรุณารอสักครู่ค่ะ");

    showLoadingAlert('กำลังสรุปผลรอบล่าสุด...', 'download');
    toggleChartOverlay(true); 
    fetchReportData({ reportType: document.getElementById('reportType').value, sessionId: sessionId });
    
  } else {
    filterForm.classList.remove('hidden');
    if(typeof speakAI === 'function') speakAI("โหมด Report Center พร้อมใช้งานค่ะ");
    
    // 🎯 สั่งอัปเดต UI ให้ตรงกับค่าที่เลือกอยู่ใน Dropdown ปัจจุบัน
    if (typeof rtUpdateModalLabels === 'function') {
        rtUpdateModalLabels(document.getElementById('reportType').value);
    }
    
    const startDateEl = document.getElementById('startDate');
    const endDateEl = document.getElementById('endDate');
    if(startDateEl) { startDateEl.value = ''; startDateEl.type = 'text'; }
    if(endDateEl) { endDateEl.value = ''; endDateEl.type = 'text'; }
    
    // 🎯 ล้างค่าตัวแปรกลางเมื่อเปิดโหมดปกติ เพื่อไม่ให้ข้อมูลกวนกัน
    instantStartDate = "";
    instantEndDate = "";
    
    toggleChartOverlay(false);
  }
}

function closeReportModal() {
  document.getElementById('reportModal').classList.add('hidden');
  currentReportData = null; 
}

function toggleChartOverlay(show) {
  const overlay = document.getElementById('chartLoadingOverlay');
  if(overlay) {
    if(show) overlay.classList.remove('hidden');
    else overlay.classList.add('hidden');
  }
}

function resetReportUI() {
  const totalEl = document.getElementById('sumTotal');
  const passEl = document.getElementById('sumPass');
  const failEl = document.getElementById('sumFail');
  
  if(totalEl) totalEl.innerText = '0';
  if(passEl) passEl.innerText = '0';
  if(failEl) failEl.innerText = '0';
  
  const tbody = document.getElementById('issueTableBody');
  if(tbody) tbody.innerHTML = '<tr><td colspan="3" class="text-center p-6 text-gray-400 font-bold">ยังไม่มีข้อมูล</td></tr>';
  
  renderApexChart(0, 0, 0); 
}

function generateReport() {
  const type = document.getElementById('reportType').value;
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  if (!start || !end) {
    Swal.fire({
      icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาเลือกช่วงวันที่ให้ครบถ้วนก่อนครับ',
      customClass: { popup: 'rounded-3xl' }
    });
    return;
  }

  showLoadingAlert('กำลังค้นหาข้อมูล...', 'download');
  toggleChartOverlay(true); 
  fetchReportData({ reportType: type, startDate: start, endDate: end });
}

function fetchReportData(params) {
  google.script.run
    .withSuccessHandler(function(response) {
      Swal.close();
      toggleChartOverlay(false); 
      if (response && response.status === 'success') {
        currentReportData = response;
        renderReportDashboard(response); 
      } else {
        Swal.fire('ข้อผิดพลาด', 'Backend ขัดข้อง: ' + (response.message || 'ดึงข้อมูลไม่ได้'), 'error');
        resetReportUI();
      }
    })
    .withFailureHandler(function(error) {
      Swal.close();
      toggleChartOverlay(false); 
      Swal.fire('ข้อผิดพลาดการเชื่อมต่อ', 'ไม่สามารถคุยกับ Server ได้: ' + error.message, 'error');
      resetReportUI();
    })
    .getReportData(params); 
}

function renderReportDashboard(data) {
  const summary = data.summary;
  const isHK = document.getElementById('reportType').value === 'Routine_HK';

  if (!data.records || data.records.length === 0) {
     Swal.fire({
        icon: 'info', title: 'ไม่พบข้อมูล', text: 'ไม่มีประวัติข้อมูลในช่วงเวลาหรือเงื่อนไขที่คุณเลือกครับ',
        confirmButtonColor: '#06245C'
     });
     resetReportUI();
     return;
  }

  // 🎯 นำข้อมูลวันที่ที่หลังบ้านคำนวณมา ยัดใส่ตัวแปร Global ที่คุณมีอยู่แล้ว
  if (data.autoStartDate) instantStartDate = data.autoStartDate;
  if (data.autoEndDate) instantEndDate = data.autoEndDate;

  // 🎯 พยายามยัดลงหน้าจอด้วย (เพื่อให้แสดงผลในช่องปฏิทินถ้าหน้าต่างเปิดอยู่)
  const startDateInput = document.getElementById('startDate');
  const endDateInput = document.getElementById('endDate');
  
  if (data.autoStartDate && startDateInput) {
      startDateInput.type = 'date';
      startDateInput.value = data.autoStartDate;
  }
  if (data.autoEndDate && endDateInput) {
      endDateInput.type = 'date';
      endDateInput.value = data.autoEndDate;
  }

  let passCount = (summary && summary.statusCount) ? (summary.statusCount.Normal || 0) : 0;
  let warnCount = (summary && summary.statusCount) ? (summary.statusCount.Warning || 0) : 0;
  let failCount = (summary && summary.statusCount) ? (summary.statusCount.Critical || 0) : 0;
  let totalIssue = warnCount + failCount;
  
  // 🎯 ดึงยอดรวมมาเตรียมไว้
  const totalCount = summary.totalInspected || summary.totalAudited || 0;

  // 🚀 [ จุดเชื่อมต่อ AI ] เรียกใช้ฟังก์ชัน AI Dashboard โดยส่งค่าทั้งหมดไปให้คำนวณ
  renderAIDashboard(data, isHK, passCount, warnCount, failCount, totalCount);

  // ส่วนนี้เป็นของเดิมของคุณ (ซ่อนไว้แล้วแต่ยังอัปเดตเผื่อไว้)
  const totalEl = document.getElementById('sumTotal');
  const passEl = document.getElementById('sumPass');
  const failEl = document.getElementById('sumFail');
  if(totalEl) totalEl.innerText = totalCount;
  if(passEl) passEl.innerText = passCount;
  if(failEl) failEl.innerText = totalIssue;

  const tbody = document.getElementById('issueTableBody');
  if (tbody) {
    if (summary.issueList && summary.issueList.length > 0) {
      tbody.innerHTML = '';
      summary.issueList.forEach(issue => {
        let statusTxt = issue.status.replace(/🔴|🟠|🟢/g, '').trim();
        let isCritical = issue.status.includes('🔴') || statusTxt.includes('ผิดปกติ') || statusTxt.includes('อุปสรรค');
        let statusColor = isCritical ? 'text-red-600 bg-red-50' : (issue.status.includes('🟠') || statusTxt.includes('ซ่อม') || statusTxt.includes('รอ') ? 'text-orange-500 bg-orange-50' : 'text-green-600 bg-green-50');
        
        let row = `<tr class="hover:bg-gray-50/50 transition-colors border-b border-gray-100">
                     <td class="p-2.5 font-bold text-gray-700">${issue.location || issue.category || '-'}</td>
                     <td class="p-2.5 text-[11px] text-gray-600 leading-tight">${issue.details || '-'} ${issue.gmrl && issue.gmrl !== '-' ? '<br><span class="text-blue-500">Ref: '+issue.gmrl+'</span>' : ''}</td>
                     <td class="p-2.5"><span class="${statusColor} px-2 py-1 rounded-lg text-[10px] font-black border border-current whitespace-nowrap">${statusTxt}</span></td>
                   </tr>`;
        tbody.innerHTML += row;
      });
    } else {
      let emptyMsg = isHK ? "✨ ไม่มีประวัติการปฏิบัติงานในรอบนี้" : "🎉 ไม่พบปัญหาในรอบนี้";
      tbody.innerHTML = `<tr><td colspan="3" class="text-center p-6 text-green-600 font-black tracking-widest bg-green-50/50">${emptyMsg}</td></tr>`;
    }
  }
  renderApexChart(passCount, warnCount, failCount);
}

// 🎯 ล้างค่าตัวแปรเมื่อปิดหน้าต่าง (ป้องกันวันที่ค้าง)
function closeReportModal() {
  document.getElementById('reportModal').classList.add('hidden');
  currentReportData = null; 
  instantStartDate = ""; // 🎯 ล้างค่า
  instantEndDate = "";   // 🎯 ล้างค่า
}

function renderApexChart(pass, warn, fail) {
  const container = document.getElementById('chartContainer');
  const listContainer = document.getElementById('reportStatusList');
  const totalEl = document.getElementById('reportChartTotal');
  
  if(container) container.innerHTML = ''; 
  if(listContainer) listContainer.innerHTML = '';

  const total = pass + warn + fail;
  if(totalEl) totalEl.innerText = total; 

  if (total === 0) {
    if(container) container.innerHTML = '<div class="text-white opacity-40 text-xs flex items-center justify-center h-full">ไม่มีข้อมูลสถานะให้แสดงกราฟ</div>';
    if(listContainer) listContainer.innerHTML = '<p class="text-[#06245C] opacity-60 text-center text-xs">ยังไม่มีข้อมูลในระบบ</p>';
    return;
  }

  // 🎯 เปลี่ยน Label ของกราฟแบบ Dynamic ตามโหมดที่เลือก
  const isHK = document.getElementById('reportType').value === 'Routine_HK';
  const labels = isHK 
        ? ['เสร็จสมบูรณ์ (Done)', 'รอดำเนินการ (Pending)', 'พบอุปสรรค (Issue)'] 
        : ['ปกติ (Normal)', 'แจ้งซ่อม (Warning)', 'ผิดปกติ (Critical)'];

  const values = [pass, warn, fail];
  const colors = ['#22c55e', '#f97316', '#ef4444']; 
  const icons = ['✅', '🔧', '🚨'];

  const seriesValues = values.map(v => total > 0 ? Math.round((v / total) * 100) : 0);

  const options = {
    series: seriesValues,
    chart: { type: 'radialBar', height: 350, fontFamily: 'Noto Sans Thai' },
    plotOptions: {
      radialBar: {
        startAngle: -175,
        endAngle: 175,
        hollow: { size: '60%', background: 'transparent' },
        track: { background: 'rgba(6,36,92,0.1)', strokeWidth: '100%' },
        dataLabels: {
          name: { show: false },
          value: { 
            show: true, fontSize: '18px', fontWeight: '900', color: '#06245C', offsetY: -5, 
            formatter: function (val, opt) { return values[opt.seriesIndex]; }
          }
        }
      }
    },
    grid: { padding: { top: 0, bottom: 20, left: 10, right: 10 } },
    colors: colors, stroke: { lineCap: 'round' }, labels: labels, legend: { show: false }
  };

  if (typeof reportChartInstance !== 'undefined' && reportChartInstance) { reportChartInstance.destroy(); }
  if(container) {
    reportChartInstance = new ApexCharts(container, options);
    reportChartInstance.render();
  }

  let listHTML = '';
  values.forEach((val, index) => {
    let percent = total > 0 ? Math.round((val / total) * 100) : 0;
    listHTML += `
      <div class="flex items-center justify-between bg-white hover:bg-gray-50 transition-all rounded-2xl p-2.5 border border-gray-100 shadow-sm">
         <div class="flex items-center gap-3 w-full pr-3">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-inner shrink-0" style="background-color: ${colors[index]}20; border: 1px solid ${colors[index]}50;">
               ${icons[index]}
            </div>
            <div class="w-full">
               <div class="flex justify-between items-end mb-1">
                  <p class="text-xs text-gray-700 font-extrabold">${labels[index]}</p>
                  <span class="text-[10px] font-black" style="color: ${colors[index]}; opacity: 0.7;">${percent}%</span>
               </div>
               <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden shadow-inner">
                  <div class="h-full rounded-full transition-all duration-1000" style="width: ${percent}%; background-color: ${colors[index]};"></div>
               </div>
            </div>
         </div>
         <div class="px-3 py-1.5 rounded-xl border shrink-0" style="background-color: ${colors[index]}10; border-color: ${colors[index]}30;">
            <span class="text-sm font-black" style="color: ${colors[index]};">${val}</span>
         </div>
      </div>
    `;
  });
  if(listContainer) listContainer.innerHTML = listHTML;
}

/**
 * =========================================================================
 * 🚀 S.A.M. ULTIMATE REPORT ENGINE (Native Canvas Drawing - V.6 HK Ready)

function formatDisplayDate(dateStr) {
    if (!dateStr || dateStr === "") return "ไม่ระบุ";
    if (dateStr.includes('-')) {
        const parts = dateStr.split('-');
        if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`; 
    }
    return dateStr;
}

async function getApexChartBase64() {
    return new Promise((resolve) => {
        if (typeof reportChartInstance === 'undefined' || !reportChartInstance) { resolve(""); return; }
        try { reportChartInstance.dataURI().then(({ imgURI }) => { resolve(imgURI); }).catch(() => { resolve(""); });
        } catch (error) { resolve(""); }
    });
}

function loadImageToCanvas(base64Src) {
    return new Promise((resolve) => {
        if (!base64Src) { resolve(null); return; }
        const img = new Image(); img.crossOrigin = "Anonymous";
        img.onload = () => resolve(img); img.onerror = () => resolve(null);
        img.src = base64Src;
    });
}

function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
    if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

function drawNativeStatusCard(ctx, x, y, width, label, count, total, color, icon) {
    const height = 70;
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    const fontName = "'Noto Sans Thai', sans-serif";

    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "rgba(0,0,0,0.05)"; ctx.shadowBlur = 10;
    roundRect(ctx, x, y, width, height, 15, true, false);
    ctx.shadowBlur = 0; 

    ctx.beginPath(); ctx.arc(x + 35, y + 35, 18, 0, 2 * Math.PI);
    ctx.fillStyle = color + "20"; ctx.fill(); 
    ctx.fillStyle = color; ctx.font = "20px Arial"; ctx.textAlign = "center"; ctx.fillText(icon, x + 35, y + 42);

    ctx.textAlign = "left"; ctx.fillStyle = "#374151"; ctx.font = `bold 20px ${fontName}`;
    ctx.fillText(label, x + 70, y + 33);

    ctx.textAlign = "right"; ctx.fillStyle = color; ctx.font = `900 18px ${fontName}`;
    ctx.fillText(`${pct}%`, x + width - 100, y + 33); 

    const barW = width - 170; const barX = x + 70; const barY = y + 45;
    ctx.fillStyle = "#F3F4F6"; roundRect(ctx, barX, barY, barW, 10, 5, true, false); 
    if (pct > 0) {
        ctx.fillStyle = color; roundRect(ctx, barX, barY, (pct / 100) * barW, 10, 5, true, false); 
    }

    ctx.fillStyle = color + "15"; ctx.strokeStyle = color + "40";
    roundRect(ctx, x + width - 75, y + 15, 60, 40, 10, true, true);
    ctx.textAlign = "center"; ctx.fillStyle = color; ctx.font = `900 22px ${fontName}`;
    ctx.fillText(count, x + width - 45, y + 43);
}

async function downloadReport(exportType) {
    if (!currentReportData || !currentReportData.summary) {
        Swal.fire('แจ้งเตือน', 'กรุณาดึงข้อมูลรายงานก่อนทำการดาวน์โหลดครับ', 'warning'); return;
    }

    showLoadingAlert('S.A.M. กำลังเตรียมข้อมูลรูปภาพและสร้างรายงาน...', 'download');
    await new Promise(resolve => setTimeout(resolve, 800));

    try {
        const summary = currentReportData.summary; const issues = summary.issueList || [];
        const reportTypeVal = document.getElementById('reportType').value;
        const isHK = reportTypeVal === 'Routine_HK';

        let reportTypeName = "";
        if (reportTypeVal === 'Routine') reportTypeName = "รายงานการเดินตรวจรอบ (Routine)";
        else if (reportTypeVal === 'Routine_HK') reportTypeName = "รายงานผลการปฏิบัติงาน (Housekeeping)";
        else reportTypeName = "รายงานความปลอดภัย (Safety Audit)";

        const rawStart = document.getElementById('startDate').value || instantStartDate;
        const rawEnd = document.getElementById('endDate').value || instantEndDate;

        const startDate = formatDisplayDate(rawStart);
        const endDate = formatDisplayDate(rawEnd);

        const passCount = summary.statusCount.Normal || 0;
        const warnCount = summary.statusCount.Warning || 0;
        const failCount = summary.statusCount.Critical || 0;
        const totalCount = passCount + warnCount + failCount;

        const preloadedImages = [];
        if (issues.length > 0) {
            for (let i = 0; i < issues.length; i++) {
                let imgUrl = issues[i].imageUrl || issues[i].image || issues[i].picture || null;
                if (imgUrl) {
                    let imgObj = await loadImageToCanvas(imgUrl);
                    preloadedImages.push(imgObj);
                } else {
                    preloadedImages.push(null);
                }
            }
        }

        const chartBase64 = await getApexChartBase64();
        const chartImg = await loadImageToCanvas(chartBase64);

        // 🎯 ดึงข้อมูลจาก AI Dashboard บนหน้าจอ
        const aiGrade = document.getElementById('aiGradeLetter').innerText || "?";
        const aiPctStr = document.getElementById('aiGradePercent').innerText || "[ 0% ]";
        const aiInsight = document.getElementById('aiInsightText').innerText || "";
        const aiScore = document.getElementById('aiScoreVal').innerText || "-";
        const aiEvidence = document.getElementById('aiEvidenceVal').innerText || "-";
        const aiEvidenceSubText = document.getElementById('aiEvidenceSub').innerText || "รอประมวลผล"; 
        const aiPace = document.getElementById('aiPaceVal').innerText || "-";
        const aiPaceText = document.getElementById('aiPaceSub').innerText || "";

        // 🎯 ดึงเฉพาะตัวเลข % ออกมา เพื่อคำนวณสีให้ตรงกับหน้าเว็บเป๊ะๆ
        let pctNumber = parseInt(aiPctStr.replace(/\D/g, '')) || 0;

        let gradeColor = "#ef4444"; let insightBg = "#FEF2F2"; let insightText = "#B91C1C"; let insightBorder = "#FECACA"; // สีแดง

        if (pctNumber === 100) {
            gradeColor = "#16a34a"; insightBg = "#F0FDF4"; insightText = "#15803D"; insightBorder = "#86EFAC"; // สีเขียว
        } else if (pctNumber >= 90) {
            gradeColor = "#06245C"; insightBg = "#EFF6FF"; insightText = "#1D4ED8"; insightBorder = "#BFDBFE"; // สีน้ำเงิน
        } else if (pctNumber >= 70) {
            gradeColor = "#f97316"; insightBg = "#FFF7ED"; insightText = "#C2410C"; insightBorder = "#FED7AA"; // สีส้ม
        }

        const w = 1200; const h = 1697; const rowHeight = 90;
        const fontName = "'Noto Sans Thai', sans-serif";

// ฟังก์ชันสำหรับเรียกหน้าต่าง Share ของมือถือ/คอม
window.triggerNativeShare = async function() {
    if(window.tempShareFile) {
        try {
            await navigator.share({
                files: [window.tempShareFile],
                title: 'รายงาน S.A.M.',
                text: 'ส่งรายงานสรุปผลการปฏิบัติงาน'
            });
        } catch (err) {
            console.log('Share canceled or not supported', err);
        }
    }
}

        document.getElementById('defectContainerWrapper').classList.add('hidden');

    if (!totalCount || totalCount === 0 || !data.records || data.records.length === 0) {

    const records = data.records;
    const summary = data.summary || {};
    let actualTotal = totalCount;
    
    let filteredRecords = records.filter(r => {
        let rowContent = JSON.stringify(r).toUpperCase();
        if (isHK) return rowContent.includes('HK'); 
        return rowContent.includes('RT') || rowContent.includes('SA') || !rowContent.includes('HK');
    });

    let badPoints = 0;
    let defectHTML = "";
    let totalDefects = 0;

    if (summary.issueList) {
        summary.issueList.forEach(issue => {
            let statusTxt = issue.status.replace(/🔴|🟠|🟢/g, '').trim();
            let isWarnOrCritical = issue.status.includes('🔴') || issue.status.includes('🟠') || statusTxt.includes('ผิดปกติ') || statusTxt.includes('อุปสรรค') || statusTxt.includes('ซ่อม');
            if (isWarnOrCritical) {
                totalDefects++;
                if (!(issue.gmrl && issue.gmrl !== '-') && !(issue.details && issue.details.length > 2)) badPoints++; 
                let formattedLoc = (issue.location || issue.category || '').replace(/\s*-\s*/, ' | ');
                defectHTML += `<div class="mb-1.5 pb-1.5 border-b border-gray-200 last:border-0"><p class="text-[11px] font-bold text-red-700">${formattedLoc}</p><p class="text-[10px] text-gray-600">${issue.details || 'ไม่มีระบุหมายเหตุ'}</p></div>`;
            }
        });
    }

    let scorePercent = Math.round(((actualTotal - badPoints) / actualTotal) * 100);
    if (scorePercent < 0) scorePercent = 0;

    // 📸 ลอจิก 2: นับรูปภาพ และเตรียมข้อมูลเวลา (Timestamps)
    let imageCount = 0;
    let timestamps = [];
    filteredRecords.forEach(r => {
        let img = r.image || r.imageUrl || r.picture || r.Image || r.imageLink || r['Image Link'];
        if (img && img.toString().trim() !== '' && img !== '-') imageCount++;
        
        // 🎯 ดักจับคอลัมน์เวลาให้ครอบคลุมขึ้น
        let ts = r.timestamp || r.Timestamp || r.TimeStamp || r.Time || r['เวลา'] || r.Date;
        if (ts) {
            let parsed = new Date(ts);
            if (!isNaN(parsed.getTime())) timestamps.push(parsed);
        }
    });

    if (imageCount > actualTotal) imageCount = actualTotal;
    let evidencePercent = Math.round((imageCount / actualTotal) * 100);

    // ⚡ ลอจิก 3: Pace (แก้ปัญหา "ข้อมูลไม่พอ")
    let paceVal = "-"; let paceText = "ข้อมูลไม่พอ";
    if (timestamps.length >= 2) {
        timestamps.sort((a, b) => a - b);
        let totalMins = 0; let steps = 0;
        for (let i = 1; i < timestamps.length; i++) {
            let diff = (timestamps[i] - timestamps[i-1]) / 60000; // แปลงเป็นนาที
            // 🎯 ปรับให้กรองกว้างขึ้น: ถ้าระยะห่างมากกว่า 0 แต่ไม่เกิน 60 นาที ให้เอามาคำนวณ!
            if (diff > 0 && diff <= 60) { 
                totalMins += diff; 
                steps++; 
            }
        }
        if (steps > 0) {
            paceVal = (totalMins / steps).toFixed(1);
            paceText = (paceVal <= 5) ? "🚶‍♂️ ความเร็วมาตรฐาน" : "🔎 ตรวจสอบละเอียด";
        }
    }

    // 🌟 กำหนดเกรดและสี
    let grade = "C"; let insight = "👀 มีจุดที่ยังจัดการไม่เรียบร้อย";
    let colorGrade = "text-red-600"; let bgInsight = "bg-red-50 text-red-600 border-red-200";

    if (scorePercent === 100) {
        grade = "A+"; insight = "🌟 ยอดเยี่ยม! ภารกิจสำเร็จสมบูรณ์";
        colorGrade = "text-[#16a34a]"; bgInsight = "bg-[#f0fdf4] text-[#15803d] border-[#86efac]";
    } else if (scorePercent >= 90) {
        grade = "A"; insight = "💪 ทำได้ดีมาก ภารกิจสำเร็จเกือบสมบูรณ์";
        colorGrade = "text-[#06245C]"; bgInsight = "bg-blue-50 text-[#1d4ed8] border-blue-200";
    } else if (scorePercent >= 70) {
        grade = "B"; insight = "✌️ ทำได้ดี รักษามารตฐานไว้นะ";
        colorGrade = "text-orange-500"; bgInsight = "bg-orange-50 text-orange-700 border-orange-200";
    }

    document.getElementById('aiGradeLetter').innerText = grade;
    document.getElementById('aiGradeLetter').className = `text-3xl sm:text-4xl font-black drop-shadow-sm ${colorGrade}`;
    document.getElementById('aiGradePercent').innerText = `[ ${scorePercent}% ]`;
    document.getElementById('aiGradePercent').className = `text-xl font-black drop-shadow-sm ${colorGrade}`;
    document.getElementById('aiInsightText').innerText = insight;
    document.getElementById('aiInsightText').className = `text-[11px] sm:text-xs font-bold inline-block px-4 py-1.5 rounded-full border shadow-sm ${bgInsight}`;

    const mainColor = (scorePercent >= 90) ? "text-[#06245C]" : "text-gray-800";
    document.getElementById('aiScoreVal').innerText = `${scorePercent}%`;
    document.getElementById('aiScoreVal').className = `text-2xl font-black ${mainColor}`;
    document.getElementById('aiEvidenceVal').innerText = `${evidencePercent}%`;
    document.getElementById('aiEvidenceVal').className = `text-2xl font-black ${evidencePercent === 100 ? "text-[#06245C]" : "text-gray-800"}`;
    document.getElementById('aiEvidenceSub').innerText = `หลักฐานครบ (${imageCount}/${actualTotal} รูป)`;
    document.getElementById('aiPaceVal').innerText = paceVal;
    document.getElementById('aiPaceVal').className = `text-2xl font-black ${paceVal !== '-' ? "text-[#06245C]" : "text-gray-800"}`;
    document.getElementById('aiPaceSub').innerText = paceText;

    if (totalDefects > 0) {
        document.getElementById('aiDefectAlert').classList.remove('hidden');
        document.getElementById('defectCountBtn').innerText = totalDefects;
        document.getElementById('defectContainerWrapper').classList.remove('hidden');
        document.getElementById('aiDefectList').innerHTML = defectHTML;
    } else {
        document.getElementById('defectContainerWrapper').classList.add('hidden');
    }
}

// ฟังก์ชันเปิด/ปิด Accordion
function toggleAiDefect() {
    const acc = document.getElementById('aiDefectAccordion');
    if (acc.classList.contains('hidden')) {
        acc.classList.remove('hidden');
    } else {
        acc.classList.add('hidden');
    }
}
</script>
