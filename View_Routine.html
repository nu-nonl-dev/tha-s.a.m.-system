<div id="view-routine" class="app-view hidden w-full pb-10">
  
  <div class="w-full text-center mt-2 mb-4 px-1">
    <h2 class="text-2xl sm:text-3xl font-bold text-blue-700 inline-flex items-center justify-center gap-2">
      <span class="text-3xl drop-shadow-md">🚶‍♂️</span> Routine Patrol
    </h2>
    <p class="text-sm font-bold text-gray-500 mt-1 uppercase tracking-widest">General Inspection</p>
  </div>

  <form id="routineForm" class="bg-white p-4 sm:p-6 rounded-3xl shadow-lg border border-gray-100 relative">
    
    <div class="mb-5 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
        <div class="wave-group relative !mb-0 smart-dropdown-container" id="rtInspectorContainer" data-allow-other="true">
            <textarea id="rtInspectorDisplay" rows="1" class="wave-textarea wave-input bg-transparent pr-16 font-bold resize-none overflow-hidden min-h-[54px]" placeholder=" " readonly onclick="toggleSmartDropdown('rtInspector')"></textarea>
            <label class="wave-label text-brandDark">Inspector / ผู้เดินตรวจ</label>
            <input type="hidden" id="rtInspector">
            <button type="button" onclick="toggleSmartDropdown('rtInspector')" class="absolute right-2 top-1/2 -translate-y-1/2 text-brandBlue hover:bg-blue-50 p-2 rounded-full transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg></button>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-4">
            <div class="wave-group relative !mb-0 smart-dropdown-container" id="rtFloorContainer" data-allow-other="true">
                <textarea id="rtFloorDisplay" rows="1" class="wave-textarea wave-input bg-transparent pr-10 font-bold resize-none overflow-hidden min-h-[54px]" placeholder=" " readonly onclick="toggleSmartDropdown('rtFloor')"></textarea>
                <label class="wave-label text-brandDark">Floor / ชั้น</label>
                <input type="hidden" id="rtFloor">
                <button type="button" onclick="toggleSmartDropdown('rtFloor')" class="absolute right-1 top-1/2 -translate-y-1/2 text-brandBlue hover:bg-blue-50 p-1 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg></button>
            </div>
            <div class="wave-group relative !mb-0 smart-dropdown-container" id="rtZoneContainer" data-allow-other="true">
                <textarea id="rtZoneDisplay" rows="1" class="wave-textarea wave-input bg-transparent pr-10 font-bold resize-none overflow-hidden min-h-[54px]" placeholder=" " readonly onclick="toggleSmartDropdown('rtZone')"></textarea>
                <label class="wave-label text-brandDark">Zone / โซน</label>
                <input type="hidden" id="rtZone">
                <button type="button" onclick="toggleSmartDropdown('rtZone')" class="absolute right-1 top-1/2 -translate-y-1/2 text-brandBlue hover:bg-blue-50 p-1 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg></button>
            </div>
        </div>
    </div>

    <div class="mb-5 relative z-20">
        <div class="wave-group mt-input-container relative !mb-0 transition-all duration-300 z-30"> 
          <input type="text" id="rtTopicInput" autocomplete="off" 
                 class="wave-input font-bold pr-[60px] bg-white text-brandDark border-2 border-blue-200 focus:border-blue-500 rounded-xl w-full p-4 h-[54px]" 
                 placeholder="พิมพ์หัวข้อตรวจ หรือ +อื่นๆ (เช่น หลอดไฟขาด)..."
                 onkeypress="if(event.key === 'Enter') { event.preventDefault(); rtCreateCard(); }">
          <label class="wave-label bg-white px-1">ค้นหา/เพิ่มหัวข้อตรวจเช็ค*</label>
          <button type="button" onclick="rtCreateCard()" class="absolute right-1.5 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-100 hover:bg-blue-200 text-blue-600 rounded-xl flex items-center justify-center transition-all shadow-sm active:scale-95">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
          </button>
        </div>
    </div>

    <div id="rtCardsContainer" class="flex flex-col gap-4 mb-4"></div>

    <div class="mt-4 pt-4 border-t border-gray-100">
      <button type="button" id="rtFinishRouteBtn" onclick="rtFinishPatrolSession()" class="w-full bg-gradient-to-r from-blue-600 to-brandDark text-white rounded-2xl px-6 py-4 font-bold text-lg flex justify-center items-center gap-2 transition-all shadow-lg active:scale-95">
        🏁 ปิดจบรอบการตรวจพื้นที่
      </button>
    </div>

  </form>
</div>
