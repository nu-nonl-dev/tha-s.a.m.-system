<div id="view-safety" class="app-view hidden w-full pb-10">
  
  <div class="w-full text-center mt-2 mb-4 px-1">
    <h2 class="text-2xl sm:text-3xl font-bold text-red-700 inline-flex items-center justify-center gap-2">
      <span class="text-3xl drop-shadow-md">🛡️</span> Safety Audit
    </h2>
    <p class="text-sm font-bold text-gray-500 mt-1 uppercase tracking-widest">Security & Fire Protection</p>
  </div>

  <form id="safetyForm" class="bg-white p-4 sm:p-6 rounded-3xl shadow-lg border border-gray-100 relative">
    
    <div class="mb-5 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
        <div class="wave-group relative !mb-0 smart-dropdown-container" id="sfInspectorContainer" data-allow-other="true">
            <textarea id="sfInspectorDisplay" rows="1" class="wave-textarea wave-input bg-transparent pr-16 font-bold resize-none overflow-hidden min-h-[54px]" placeholder=" " autocomplete="off" readonly onclick="toggleSmartDropdown('sfInspector')"></textarea>
            <label class="wave-label text-brandDark">Inspector / ผู้ตรวจสอบ</label>
            <input type="hidden" id="sfInspector">
            <button type="button" id="sfInspector_toggleBtn" onclick="toggleSmartDropdown('sfInspector')" class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center text-[#2563eb] bg-blue-50 hover:bg-blue-100 rounded-full transition-all z-10"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg></button>
            <button type="button" id="clear_sfInspector_dropdown" class="input-clear-btn hidden absolute right-10 top-1/2 -translate-y-1/2 w-6 h-6 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition-all z-20" onclick="clearSmartDropdown('sfInspector')"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <ul id="sfInspectorCustomList" class="smart-dropdown-list z-50"></ul>
        </div>
        <div class="wave-group relative hidden !mt-2" id="new_sfInspector">
            <textarea id="new_sfInspector_input" class="wave-textarea wave-input bg-blue-50/50 pr-8 resize-none overflow-hidden min-h-[54px]" rows="1" placeholder=" " oninput="autoResizeTextarea(this); toggleInputClearBtn(this)"></textarea>
            <label class="wave-label">ระบุชื่อผู้ตรวจสอบอื่นๆ</label>
            <button type="button" class="input-clear-btn hidden absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition-all z-20" onclick="clearInputField(this)"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
    </div>

    <div class="mb-5 bg-blue-50/50 p-4 rounded-2xl border border-blue-100 relative">
        <h3 class="text-[15px] font-black text-brandDark mb-3 flex items-center gap-1.5"><svg class="w-5 h-5 text-brandBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> พิกัดและอุปกรณ์</h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
            <div class="flex flex-col justify-end">
                <div class="wave-group relative !mb-0 smart-dropdown-container" id="sfFloorContainer" data-allow-other="true">
                    <textarea id="sfFloorDisplay" rows="1" class="wave-textarea wave-input bg-white pr-16 font-bold resize-none overflow-hidden min-h-[54px]" placeholder=" " autocomplete="off" readonly onclick="toggleSmartDropdown('sfFloor')"></textarea>
                    <label class="wave-label">ชั้น (Floor)</label>
                    <input type="hidden" id="sfFloor">
                    <button type="button" id="sfFloor_toggleBtn" onclick="toggleSmartDropdown('sfFloor')" class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center text-[#2563eb] bg-blue-50 hover:bg-blue-100 rounded-full transition-all z-10"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg></button>
                    <button type="button" id="clear_sfFloor_dropdown" class="input-clear-btn hidden absolute right-10 top-1/2 -translate-y-1/2 w-6 h-6 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition-all z-20" onclick="clearSmartDropdown('sfFloor'); resetSafetyDrilldown()"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    <ul id="sfFloorCustomList" class="smart-dropdown-list z-50"></ul>
                </div>
                <div class="wave-group relative hidden !mt-2" id="new_sfFloor">
                    <textarea id="new_sfFloor_input" class="wave-textarea wave-input bg-white pr-8 resize-none overflow-hidden min-h-[54px]" rows="1" placeholder=" " oninput="autoResizeTextarea(this); toggleInputClearBtn(this)"></textarea>
                    <label class="wave-label">ระบุชั้นอื่นๆ</label>
                    <button type="button" class="input-clear-btn hidden absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition-all z-20" onclick="clearInputField(this)"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            </div>

            <div class="flex flex-col justify-end">
                <div class="wave-group relative !mb-0 smart-dropdown-container" id="sfZoneContainer" data-allow-other="true">
                    <textarea id="sfZoneDisplay" rows="1" class="wave-textarea wave-input bg-gray-100 pr-16 text-gray-400 resize-none overflow-hidden min-h-[54px]" placeholder=" " autocomplete="off" readonly disabled onclick="toggleSmartDropdown('sfZone')"></textarea>
                    <label class="wave-label">โซน (Zone)</label>
                    <input type="hidden" id="sfZone">
                    <button type="button" id="sfZone_toggleBtn" disabled onclick="toggleSmartDropdown('sfZone')" class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center text-gray-400 bg-gray-200 rounded-full transition-all z-10"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg></button>
                    <button type="button" id="clear_sfZone_dropdown" class="input-clear-btn hidden absolute right-10 top-1/2 -translate-y-1/2 w-6 h-6 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition-all z-20" onclick="clearSmartDropdown('sfZone')"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    <ul id="sfZoneCustomList" class="smart-dropdown-list z-50"></ul>
                </div>
                <div class="wave-group relative hidden !mt-2" id="new_sfZone">
                    <textarea id="new_sfZone_input" class="wave-textarea wave-input bg-white pr-8 resize-none overflow-hidden min-h-[54px]" rows="1" placeholder=" " oninput="autoResizeTextarea(this); toggleInputClearBtn(this)"></textarea>
                    <label class="wave-label">ระบุโซนอื่นๆ</label>
                    <button type="button" class="input-clear-btn hidden absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center transition-all z-20" onclick="clearInputField(this)"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            </div>
        </div>

        <div class="relative z-20 mt-4">
            <div id="sfInputWrap" class="wave-group mt-input-container relative !mb-0 transition-all duration-300"> 
              
              <textarea id="sfAsset" disabled autocomplete="off" 
                        class="wave-textarea wave-input font-bold pr-[100px] bg-gray-100 text-gray-400 border-2 border-gray-200" 
                        rows="1" placeholder=" "
                        onclick="toggleSfAssetDropdown()"
                        onfocus="updateSfAssetButtonsState(); renderSfAssetDropdown(this.value);"
                        onblur="setTimeout(() => updateSfAssetButtonsState(), 200)"
                        oninput="handleSfAssetInput(this)"></textarea>
              <label class="wave-label">รหัส / ค้นหาชื่ออุปกรณ์*</label>

              <div class="absolute right-1.5 top-1/2 -translate-y-1/2 flex items-center gap-1 z-30 pointer-events-auto bg-white pl-1 py-1 rounded-xl">
                
                <button type="button" id="sfDropdownToggleBtn" disabled onclick="toggleSfAssetDropdown()" class="w-9 h-9 text-gray-400 bg-gray-200 border border-gray-300 rounded-xl flex items-center justify-center transition-all shadow-sm">
                  <svg class="w-5 h-5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <button type="button" id="sfClearBtn" onclick="clearSfAssetOnly()" class="hidden w-9 h-9 bg-red-100 text-red-500 hover:bg-red-200 hover:text-red-700 rounded-xl flex items-center justify-center transition-all shadow-sm">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>

                <button type="button" id="sfMicBtn" disabled onclick="startVoiceSearchSf()" class="hidden w-9 h-9 bg-gray-100 text-gray-400 rounded-xl border border-gray-200 focus:outline-none transition-all flex items-center justify-center group active:scale-95" title="ค้นหาด้วยเสียง">
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
                
                <button type="button" id="sfQrBtn" disabled onclick="openQRScanner('sfAsset')" class="w-9 h-9 bg-gray-100 text-gray-400 rounded-xl border border-gray-200 focus:outline-none transition-all flex items-center justify-center group active:scale-95" title="สแกน QR">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7V5a2 2 0 012-2h2m10 0h2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9"></path></svg>
                </button>
                
              </div>
            </div>
            
            <ul id="sfAssetDropdown" class="hidden absolute top-[50px] left-0 w-full bg-white border-2 border-brandBlue/20 rounded-xl shadow-xl max-h-56 overflow-y-auto z-50 divide-y divide-gray-100"></ul>

            <div id="sfAssetPreviewContainer" class="mt-3 w-full border border-dashed border-gray-300 bg-gray-50 rounded-xl flex flex-col items-center justify-center overflow-hidden transition-all duration-500 h-20 shadow-sm relative group">
               
               <button type="button" id="sfExpandAssetImgBtn" 
                       onclick="if(typeof expandImageFullscreen === 'function'){ expandImageFullscreen('sfAssetPreviewImg'); } else if(typeof Swal !== 'undefined'){ Swal.fire({imageUrl: document.getElementById('sfAssetPreviewImg').src, imageAlt: 'Preview', width: '90%', showConfirmButton: false, customClass: {popup: 'rounded-3xl bg-transparent'}}); }" 
                       class="hidden absolute top-1.5 right-1.5 w-7 h-7 bg-white/90 text-brandBlue hover:bg-white hover:scale-110 rounded-lg shadow-md flex items-center justify-center transition-all z-10 border border-blue-100 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
               </button>

               <div id="sfAssetPreviewPlaceholder" class="flex flex-col items-center justify-center text-gray-400 transition-opacity duration-300">
                  <svg class="w-6 h-6 mb-1 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                  <span id="sfAssetPreviewText" class="text-xs font-medium tracking-wide">รอรหัสเพื่อโหลดรูปภาพ...</span>
               </div>
               
               <img id="sfAssetPreviewImg" src="" alt="Asset Preview" 
                    class="w-full h-full object-contain hidden transition-opacity duration-500 cursor-pointer" 
                    onload="if(this.src && this.src !== window.location.href) document.getElementById('sfExpandAssetImgBtn').classList.remove('hidden');"
                    onclick="document.getElementById('sfExpandAssetImgBtn').click()">
            </div>
        </div>
    </div>

    <div id="safetyChecklistContainer" class="hidden mb-5">
        <h3 class="text-[15px] font-black text-brandDark mb-3 flex items-center gap-1.5"><svg class="w-5 h-5 text-brandBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> รายการตรวจสอบ (Checklist)</h3>
        <div id="checklistItems" class="space-y-3"></div>
    </div>

    <div id="evidenceContainer" class="hidden overflow-hidden transition-all duration-500">
        <div class="mb-5 p-4 bg-red-50/80 border-2 border-dashed border-red-300 rounded-3xl shadow-sm relative">
            <h3 class="text-[15px] font-black text-red-600 mb-3 flex items-center gap-1.5"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> ข้อมูลการชำรุดและหลักฐาน</h3>
            
            <div class="mb-3">
                <label class="block text-xs font-bold text-gray-600 mb-2">📸 แนบรูปภาพจุดที่ชำรุด (บังคับ)</label>
                <div class="relative w-full flex items-center box-border">
                    <input type="file" id="sfImage" accept="image/*,application/pdf" class="block w-full box-border text-sm text-gray-500 file:mr-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:font-bold file:bg-red-100 file:text-red-600 hover:file:bg-red-200 border-2 border-red-200 focus:border-red-500 shadow-sm rounded-xl bg-white cursor-pointer pr-10 outline-none transition-all">
                    <button type="button" id="sfClearImageBtn" onclick="clearSfUploadImage()" class="hidden absolute right-2 w-8 h-8 bg-red-100 hover:bg-red-200 text-red-600 rounded-full flex items-center justify-center transition-all z-10 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>

            <div id="sfUploadPreviewContainer" class="mb-5 w-full border border-dashed border-red-200 bg-red-50/50 rounded-2xl flex flex-col items-center justify-center h-32 overflow-hidden relative transition-all group">
                
                <button type="button" id="sfExpandUploadImgBtn" onclick="expandImageFullscreen('sfUploadPreviewImg')" class="hidden absolute top-2 right-2 w-8 h-8 bg-white/90 text-red-600 hover:bg-white hover:scale-110 rounded-lg shadow-md flex items-center justify-center transition-all z-20 border border-red-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>

                <img id="sfUploadPreviewImg" 
                     class="hidden absolute inset-0 w-full h-full object-contain bg-black/5 cursor-pointer z-10" 
                     onload="document.getElementById('sfExpandUploadImgBtn').classList.remove('hidden')"
                     onclick="if(typeof expandImageFullscreen === 'function') expandImageFullscreen('sfUploadPreviewImg')">
                     
                <div id="sfUploadPreviewPlaceholder" class="text-sm text-red-300 font-bold flex flex-col items-center gap-2 z-0">
                    <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    รอโหลดรูปภาพ
                </div>
            </div>

            <div class="mb-4 wave-group !mt-4 !mb-0">
                <textarea id="sfRemarks" rows="2" class="wave-input resize-none bg-white" placeholder=" "></textarea>
                <label class="wave-label text-red-500">หมายเหตุ / อธิบายอาการชำรุด</label>
            </div>

            <div class="border-t border-red-200 pt-3 mt-3">
                <label class="block text-xs font-bold text-gray-600 mb-2">📊 ประเมินสถานะขั้นสุดท้าย</label>
                <div class="grid grid-cols-1 gap-2" id="severityOptions">
                    <label class="flex items-center gap-2 p-2 border-2 border-yellow-200 bg-yellow-50 rounded-xl cursor-pointer hover:bg-yellow-100 transition-colors">
                        <input type="radio" name="severity" value="2" class="w-4 h-4 text-yellow-500" onchange="checkAutoGmrl()">
                        <span class="text-sm font-bold text-yellow-700">🟡 เฝ้าระวัง / ยังใช้งานได้</span>
                    </label>
                    <label class="flex items-center gap-2 p-2 border-2 border-orange-200 bg-orange-50 rounded-xl cursor-pointer hover:bg-orange-100 transition-colors">
                        <input type="radio" name="severity" value="3" class="w-4 h-4 text-orange-500" onchange="checkAutoGmrl()">
                        <span class="text-sm font-bold text-orange-700">🟠 ควรรีบแก้ไขซ่อมแซม</span>
                    </label>
                    <label class="flex items-center gap-2 p-2 border-2 border-red-200 bg-red-50 rounded-xl cursor-pointer hover:bg-red-100 transition-colors">
                        <input type="radio" name="severity" value="4" class="w-4 h-4 text-red-500" onchange="checkAutoGmrl()">
                        <span class="text-sm font-bold text-red-700">🔴 ชำรุดหนัก / เปลี่ยนทันที</span>
                    </label>
                    <label class="flex items-center gap-2 p-2 border-2 border-blue-200 bg-blue-50 rounded-xl cursor-pointer hover:bg-blue-100 transition-colors">
                        <input type="radio" name="severity" value="5" class="w-4 h-4 text-blue-500" onchange="checkAutoGmrl()">
                        <span class="text-sm font-bold text-blue-700">🔵 ขอจัดซื้อใหม่ / แทงจำหน่าย</span>
                    </label>
                </div>
            </div>

            <div id="autoGmrlToggle" class="mt-4 pt-3 border-t border-red-200 flex items-center justify-between hidden">
                <span class="text-sm font-bold text-gray-700 flex items-center gap-1.5">
                    <svg class="w-4 h-4 text-brandBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> 
                    ส่งข้อมูลเปิดใบแจ้งซ่อม (GMRL)
                </span>
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" id="sfCreateGmrl" class="sr-only peer" checked>
                  <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brandBlue"></div>
                </label>
            </div>
        </div>
    </div>
