<script>
/**
 * =======================================================
 * REPORT SYSTEM FRONTEND (Phase 5 - Ultimate Image Engine)
 * ผสานระบบ UI ใหม่ และระบบดึงรูปภาพลง PDF/JPG
 * =======================================================
 */

let currentReportData = null;
let reportChartInstance = null; 

// 🟢 ฟังก์ชันหน้าต่างโหลดดิ้ง
function showLoadingAlert(msg, mode = 'download') { 
  const arrowPath = (mode === 'upload') 
    ? "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 13l3-3m0 0l3 3m-3-3v9" 
    : "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"; 

  Swal.fire({ 
    html: `
      <div class="flex flex-col items-center justify-center py-6">
        <div class="relative w-20 h-20 flex items-center justify-center mb-6">
          <div class="absolute inset-0 rounded-full border-t-4 border-[#04d4d4] animate-spin"></div>
          <div class="absolute inset-2 rounded-full border-r-4 border-blue-400 animate-spin" style="animation-direction: reverse;"></div>
          <svg class="w-10 h-10 text-[#04d4d4] relative z-10 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="${arrowPath}"></path>
          </svg>
        </div>
        <h3 class="text-xl font-black text-[#06245C] tracking-wide mb-2">${msg}</h3>
        <p class="text-[10px] text-blue-500 font-bold tracking-widest animate-pulse uppercase">S.A.M. Processing...</p>
      </div>
    `, 
    allowOutsideClick: false, 
    showConfirmButton: false, 
    customClass: { 
      container: 'z-[999999]', 
      popup: 'rounded-[2rem] shadow-2xl border border-gray-100 bg-white/95 backdrop-blur-xl' 
    } 
  }); 
}

function openReportModal(mode, sessionId = null) {
  const modal = document.getElementById('reportModal');
  const filterForm = document.getElementById('reportFilterForm');
  
  resetReportUI();
  modal.classList.remove('hidden');
  
  if (mode === 'Instant' && sessionId) {
    filterForm.classList.add('hidden');
    document.getElementById('reportType').value = 'Routine';
    
    if(typeof speakAI === 'function') speakAI("กำลังสรุปผลการเดินตรวจรอบนี้ กรุณารอสักครู่ค่ะ");

    showLoadingAlert('กำลังสรุปผลรอบล่าสุด...', 'download');
    toggleChartOverlay(true); 
    fetchReportData({ reportType: 'Routine', sessionId: sessionId });
    
  } else {
    filterForm.classList.remove('hidden');
    if(typeof speakAI === 'function') speakAI("โหมด Report Center พร้อมใช้งานค่ะ");
    
    const startDateEl = document.getElementById('startDate');
    const endDateEl = document.getElementById('endDate');
    if(startDateEl) { startDateEl.value = ''; startDateEl.type = 'text'; }
    if(endDateEl) { endDateEl.value = ''; endDateEl.type = 'text'; }
    
    toggleChartOverlay(false);
  }
}

function closeReportModal() {
  document.getElementById('reportModal').classList.add('hidden');
  currentReportData = null; 
}

function toggleChartOverlay(show) {
  const overlay = document.getElementById('chartLoadingOverlay');
  if(overlay) {
    if(show) overlay.classList.remove('hidden');
    else overlay.classList.add('hidden');
  }
}

function resetReportUI() {
  const totalEl = document.getElementById('sumTotal');
  const passEl = document.getElementById('sumPass');
  const failEl = document.getElementById('sumFail');
  
  if(totalEl) totalEl.innerText = '0';
  if(passEl) passEl.innerText = '0';
  if(failEl) failEl.innerText = '0';
  
  const tbody = document.getElementById('issueTableBody');
  if(tbody) tbody.innerHTML = '<tr><td colspan="3" class="text-center p-6 text-gray-400 font-bold">ยังไม่มีข้อมูล</td></tr>';
  
  renderApexChart(0, 0, 0); 
}

function generateReport() {
  const type = document.getElementById('reportType').value;
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  if (!start || !end) {
    Swal.fire({
      icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาเลือกช่วงวันที่ให้ครบถ้วนก่อนครับ',
      customClass: { popup: 'rounded-3xl' }
    });
    return;
  }

  showLoadingAlert('กำลังค้นหาข้อมูล...', 'download');
  toggleChartOverlay(true); 
  fetchReportData({ reportType: type, startDate: start, endDate: end });
}

function fetchReportData(params) {
  google.script.run
    .withSuccessHandler(function(response) {
      Swal.close();
      toggleChartOverlay(false); 
      if (response && response.status === 'success') {
        currentReportData = response;
        renderReportDashboard(response); 
      } else {
        Swal.fire('ข้อผิดพลาด', 'Backend ขัดข้อง: ' + (response.message || 'ดึงข้อมูลไม่ได้'), 'error');
        resetReportUI();
      }
    })
    .withFailureHandler(function(error) {
      Swal.close();
      toggleChartOverlay(false); 
      Swal.fire('ข้อผิดพลาดการเชื่อมต่อ', 'ไม่สามารถคุยกับ Server ได้: ' + error.message, 'error');
      resetReportUI();
    })
    .getReportData(params); 
}

function renderReportDashboard(data) {
  const summary = data.summary;
  if (!data.records || data.records.length === 0) {
     Swal.fire({
        icon: 'info', title: 'ไม่พบข้อมูล', text: 'ไม่มีประวัติการตรวจในช่วงเวลาหรือเงื่อนไขที่คุณเลือกครับ',
        confirmButtonColor: '#06245C'
     });
     resetReportUI();
     return;
  }

  let passCount = (summary && summary.statusCount) ? (summary.statusCount.Normal || 0) : 0;
  let warnCount = (summary && summary.statusCount) ? (summary.statusCount.Warning || 0) : 0;
  let failCount = (summary && summary.statusCount) ? (summary.statusCount.Critical || 0) : 0;
  let totalIssue = warnCount + failCount;

  const totalEl = document.getElementById('sumTotal');
  const passEl = document.getElementById('sumPass');
  const failEl = document.getElementById('sumFail');
  
  if(totalEl) totalEl.innerText = summary.totalInspected || summary.totalAudited || 0;
  if(passEl) passEl.innerText = passCount;
  if(failEl) failEl.innerText = totalIssue;

  const tbody = document.getElementById('issueTableBody');
  if (tbody) {
    if (summary.issueList && summary.issueList.length > 0) {
      tbody.innerHTML = '';
      summary.issueList.forEach(issue => {
        let statusColor = issue.status && issue.status.includes('🔴') ? 'text-red-600 bg-red-50' : 'text-orange-500 bg-orange-50';
        // 🎯 (แสดงในหน้าเว็บ ไม่ดึงรูปมาโชว์ในตารางเว็บให้รก จะไปโชว์ใน PDF/JPG เท่านั้น)
        let row = `<tr class="hover:bg-gray-50/50 transition-colors border-b border-gray-100">
                     <td class="p-2.5 font-bold text-gray-700">${issue.location || issue.category || '-'}</td>
                     <td class="p-2.5 text-[11px] text-gray-600 leading-tight">${issue.details || '-'} ${issue.gmrl && issue.gmrl !== '-' ? '<br><span class="text-blue-500">Ref: '+issue.gmrl+'</span>' : ''}</td>
                     <td class="p-2.5"><span class="${statusColor} px-2 py-1 rounded-lg text-[10px] font-black border border-current whitespace-nowrap">${issue.status || 'พบปัญหา'}</span></td>
                   </tr>`;
        tbody.innerHTML += row;
      });
    } else {
      tbody.innerHTML = '<tr><td colspan="3" class="text-center p-6 text-green-600 font-black tracking-widest bg-green-50/50">🎉 ไม่พบปัญหาในรอบนี้</td></tr>';
    }
  }
  renderApexChart(passCount, warnCount, failCount);
}

function renderApexChart(pass, warn, fail) {
  const container = document.getElementById('chartContainer');
  const listContainer = document.getElementById('reportStatusList');
  const totalEl = document.getElementById('reportChartTotal');
  
  if(container) container.innerHTML = ''; 
  if(listContainer) listContainer.innerHTML = '';

  const total = pass + warn + fail;
  if(totalEl) totalEl.innerText = total; 

  if (total === 0) {
    if(container) container.innerHTML = '<div class="text-white opacity-40 text-xs flex items-center justify-center h-full">ไม่มีข้อมูลสถานะให้แสดงกราฟ</div>';
    if(listContainer) listContainer.innerHTML = '<p class="text-[#06245C] opacity-60 text-center text-xs">ยังไม่มีข้อมูลในระบบ</p>';
    return;
  }

  const values = [pass, warn, fail];
  const labels = ['ปกติ (Normal)', 'แจ้งซ่อม (Warning)', 'ผิดปกติ (Critical)'];
  const colors = ['#22c55e', '#f97316', '#ef4444']; 
  const icons = ['✅', '🔧', '🚨'];

  const seriesValues = values.map(v => total > 0 ? Math.round((v / total) * 100) : 0);

  const options = {
    series: seriesValues,
    chart: { type: 'radialBar', height: 350, fontFamily: 'Noto Sans Thai' },
    plotOptions: {
      radialBar: {
        startAngle: -175,
        endAngle: 175,
        hollow: { size: '60%', background: 'transparent' },
        track: { background: 'rgba(6,36,92,0.1)', strokeWidth: '100%' },
        dataLabels: {
          name: { show: false },
          value: { 
            show: true, fontSize: '18px', fontWeight: '900', color: '#06245C', offsetY: -5, 
            formatter: function (val, opt) { return values[opt.seriesIndex]; }
          }
        }
      }
    },
    grid: { padding: { top: 0, bottom: 20, left: 10, right: 10 } },
    colors: colors, stroke: { lineCap: 'round' }, labels: labels, legend: { show: false }
  };

  if (typeof reportChartInstance !== 'undefined' && reportChartInstance) { reportChartInstance.destroy(); }
  if(container) {
    reportChartInstance = new ApexCharts(container, options);
    reportChartInstance.render();
  }

  let listHTML = '';
  values.forEach((val, index) => {
    let percent = total > 0 ? Math.round((val / total) * 100) : 0;
    listHTML += `
      <div class="flex items-center justify-between bg-white hover:bg-gray-50 transition-all rounded-2xl p-2.5 border border-gray-100 shadow-sm">
         <div class="flex items-center gap-3 w-full pr-3">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-inner shrink-0" style="background-color: ${colors[index]}20; border: 1px solid ${colors[index]}50;">
               ${icons[index]}
            </div>
            <div class="w-full">
               <div class="flex justify-between items-end mb-1">
                  <p class="text-xs text-gray-700 font-extrabold">${labels[index]}</p>
                  <span class="text-[10px] font-black" style="color: ${colors[index]}; opacity: 0.7;">${percent}%</span>
               </div>
               <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden shadow-inner">
                  <div class="h-full rounded-full transition-all duration-1000" style="width: ${percent}%; background-color: ${colors[index]};"></div>
               </div>
            </div>
         </div>
         <div class="px-3 py-1.5 rounded-xl border shrink-0" style="background-color: ${colors[index]}10; border-color: ${colors[index]}30;">
            <span class="text-sm font-black" style="color: ${colors[index]};">${val}</span>
         </div>
      </div>
    `;
  });
  if(listContainer) listContainer.innerHTML = listHTML;
}

/**
 * =========================================================================
 * 🚀 S.A.M. ULTIMATE REPORT ENGINE (Native Canvas Drawing - V.5)
 * เพิ่มระบบโหลดและวาดรูปภาพประกอบปัญหาลงในตารางรายงาน
 * =========================================================================
 */

function formatDisplayDate(dateStr) {
    if (!dateStr || dateStr === "") return "ไม่ระบุ";
    if (dateStr.includes('-')) {
        const parts = dateStr.split('-');
        if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`; 
    }
    return dateStr;
}

async function getApexChartBase64() {
    return new Promise((resolve) => {
        if (typeof reportChartInstance === 'undefined' || !reportChartInstance) { resolve(""); return; }
        try { reportChartInstance.dataURI().then(({ imgURI }) => { resolve(imgURI); }).catch(() => { resolve(""); });
        } catch (error) { resolve(""); }
    });
}

// 🎯 โหลดรูปข้ามโดเมนและแปลงเข้า Canvas
function loadImageToCanvas(base64Src) {
    return new Promise((resolve) => {
        if (!base64Src) { resolve(null); return; }
        const img = new Image(); img.crossOrigin = "Anonymous";
        img.onload = () => resolve(img); img.onerror = () => resolve(null);
        img.src = base64Src;
    });
}

function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
    if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

function drawNativeStatusCard(ctx, x, y, width, label, count, total, color, icon) {
    const height = 70;
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    const fontName = "'Noto Sans Thai', sans-serif";

    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "rgba(0,0,0,0.05)"; ctx.shadowBlur = 10;
    roundRect(ctx, x, y, width, height, 15, true, false);
    ctx.shadowBlur = 0; 

    ctx.beginPath(); ctx.arc(x + 35, y + 35, 18, 0, 2 * Math.PI);
    ctx.fillStyle = color + "20"; ctx.fill(); 
    ctx.fillStyle = color; ctx.font = "20px Arial"; ctx.textAlign = "center"; ctx.fillText(icon, x + 35, y + 42);

    ctx.textAlign = "left"; ctx.fillStyle = "#374151"; ctx.font = `bold 20px ${fontName}`;
    ctx.fillText(label, x + 70, y + 33);

    ctx.textAlign = "right"; ctx.fillStyle = color; ctx.font = `900 18px ${fontName}`;
    ctx.fillText(`${pct}%`, x + width - 100, y + 33); 

    const barW = width - 170; const barX = x + 70; const barY = y + 45;
    ctx.fillStyle = "#F3F4F6"; roundRect(ctx, barX, barY, barW, 10, 5, true, false); 
    if (pct > 0) {
        ctx.fillStyle = color; roundRect(ctx, barX, barY, (pct / 100) * barW, 10, 5, true, false); 
    }

    ctx.fillStyle = color + "15"; ctx.strokeStyle = color + "40";
    roundRect(ctx, x + width - 75, y + 15, 60, 40, 10, true, true);
    ctx.textAlign = "center"; ctx.fillStyle = color; ctx.font = `900 22px ${fontName}`;
    ctx.fillText(count, x + width - 45, y + 43);
}

async function downloadReport(exportType) {
    if (!currentReportData || !currentReportData.summary) {
        Swal.fire('แจ้งเตือน', 'กรุณาดึงข้อมูลรายงานก่อนทำการดาวน์โหลดครับ', 'warning'); return;
    }
    
    // 🎯 แจ้งเตือนกระบวนการโหลดรูปภาพ
    showLoadingAlert('S.A.M. กำลังเตรียมข้อมูลรูปภาพและสร้างรายงาน...', 'download');
    await new Promise(resolve => setTimeout(resolve, 800));

    try {
        const summary = currentReportData.summary; const issues = summary.issueList || [];
        const reportTypeVal = document.getElementById('reportType').value;
        const reportTypeName = reportTypeVal === 'Routine' ? "รายงานการเดินตรวจรอบ (Routine)" : "รายงานความปลอดภัย (Safety Audit)";
        const startDate = formatDisplayDate(document.getElementById('startDate').value);
        const endDate = formatDisplayDate(document.getElementById('endDate').value);
        
        const passCount = summary.statusCount.Normal || 0;
        const warnCount = summary.statusCount.Warning || 0;
        const failCount = summary.statusCount.Critical || 0;
        const totalCount = passCount + warnCount + failCount;

        // 🎯 PRE-LOAD IMAGES: วิ่งโหลดรูปภาพทั้งหมดเข้าสู่หน่วยความจำให้เสร็จก่อนเริ่มวาดกระดาษ
        const preloadedImages = [];
        if (issues.length > 0) {
            for (let i = 0; i < issues.length; i++) {
                // มองหาฟิลด์รูปภาพ (ถ้า Backend ส่งมาเป็นชื่อ imageUrl, image, หรือ picture)
                let imgUrl = issues[i].imageUrl || issues[i].image || issues[i].picture || null;
                if (imgUrl) {
                    let imgObj = await loadImageToCanvas(imgUrl);
                    preloadedImages.push(imgObj);
                } else {
                    preloadedImages.push(null);
                }
            }
        }

        const chartBase64 = await getApexChartBase64();
        const chartImg = await loadImageToCanvas(chartBase64);

        const w = 1200; const h = 1697; const rowHeight = 90; 
        const fontName = "'Noto Sans Thai', sans-serif";
        const maxItemsPageNext = 12; 
        let totalPages = 1; if (issues.length > 0) totalPages = 1 + Math.ceil(issues.length / maxItemsPageNext);

        const pagesCanvases = []; let itemsDrawn = 0; let pageNum = 1;

        while (itemsDrawn < issues.length || pageNum === 1) {
            const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h); let currentY = 0;

            if (pageNum === 1) {
                ctx.fillStyle = "#06245C"; ctx.fillRect(0, 0, w, 160); ctx.fillStyle = "#F5F8FB"; ctx.fillRect(0, 160, w, 8);
                ctx.fillStyle = "#ffffff"; ctx.textAlign = "center";
                ctx.font = `900 65px ${fontName}`; ctx.fillText("T | H | A", w / 2, 90);
                ctx.font = `bold 22px ${fontName}`; ctx.letterSpacing = "4px"; ctx.fillText("By TH District", w / 2, 135);
                currentY = 220;
            } else { currentY = 100; }

            ctx.fillStyle = "#666666"; ctx.font = `bold 20px ${fontName}`; ctx.textAlign = "left"; 
            ctx.fillText("ประเภทรายงาน", 60, currentY); ctx.textAlign = "right"; ctx.fillText(`ตั้งแต่วันที่ : ${startDate}`, w - 60, currentY);
            currentY += 40; ctx.fillStyle = "#06245C"; ctx.font = `bold 30px ${fontName}`; ctx.textAlign = "left"; 
            ctx.fillText(reportTypeName, 60, currentY); ctx.fillStyle = "#666666"; ctx.font = `bold 20px ${fontName}`; ctx.textAlign = "right"; 
            ctx.fillText(`ถึงวันที่ : ${endDate}`, w - 60, currentY - 5);
            currentY += 30; ctx.strokeStyle = "#E5E7EB"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(60, currentY); ctx.lineTo(w - 60, currentY); ctx.stroke(); currentY += 50;

            if (pageNum === 1) {
                ctx.fillStyle = "#F9FAFB"; ctx.strokeStyle = "#E5E7EB"; ctx.lineWidth = 2;
                roundRect(ctx, 60, currentY, 340, 110, 20, true, true); roundRect(ctx, 430, currentY, 340, 110, 20, true, true); roundRect(ctx, 800, currentY, 340, 110, 20, true, true);
                ctx.textAlign = "center"; ctx.fillStyle = "#6B7280"; ctx.font = `bold 20px ${fontName}`;
                ctx.fillText("ตรวจทั้งหมด", 230, currentY + 40); ctx.fillText("ปกติ (Normal)", 600, currentY + 40); ctx.fillText("พบปัญหา (Issue)", 970, currentY + 40);
                ctx.font = `900 55px ${fontName}`; ctx.fillStyle = "#06245C"; ctx.fillText(totalCount, 230, currentY + 95);
                ctx.fillStyle = "#22c55e"; ctx.fillText(passCount, 600, currentY + 95); ctx.fillStyle = "#ef4444"; ctx.fillText(warnCount + failCount, 970, currentY + 95);
                currentY += 150;

                if (chartImg) {
                    ctx.drawImage(chartImg, (w / 2) - 230, currentY, 460, 460);
                    ctx.textAlign = "center"; ctx.fillStyle = "#06245C"; ctx.font = `900 75px ${fontName}`;
                    ctx.fillText(totalCount, w / 2, currentY + 235); 

                    const pillW = 140; const pillH = 34; 
                    const pillX = (w / 2) - (pillW / 2);
                    const pillY = currentY + 252; 
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.strokeStyle = "rgba(6, 36, 92, 0.1)"; ctx.lineWidth = 1;
                    roundRect(ctx, pillX, pillY, pillW, pillH, 17, true, true);
                    ctx.fillStyle = "#06245C"; ctx.font = `900 13px ${fontName}`; ctx.letterSpacing = "1.5px"; 
                    ctx.fillText("ตรวจพบทั้งหมด", w / 2, pillY + 22); ctx.letterSpacing = "0px";

                    ctx.fillStyle = "#A5A5A5"; ctx.font = `bold 14px ${fontName}`;
                    ctx.fillText("BY THA SMART ASSET SYSTEM [ S.A.M. ]", w / 2, currentY + 440);
                }
                
                currentY += 540;

                const cardW = 640; const cardX = (w - cardW) / 2;
                ctx.textAlign = "left"; ctx.fillStyle = "#06245C"; ctx.font = `900 24px ${fontName}`;
                ctx.fillText("• สรุปสัดส่วนสถานะการตรวจ", cardX, currentY - 20);

                drawNativeStatusCard(ctx, cardX, currentY, cardW, "ปกติ (Normal)", passCount, totalCount, "#22c55e", "✅"); currentY += 85;
                drawNativeStatusCard(ctx, cardX, currentY, cardW, "แจ้งซ่อม (Warning)", warnCount, totalCount, "#f97316", "🔧"); currentY += 85;
                drawNativeStatusCard(ctx, cardX, currentY, cardW, "ผิดปกติ (Critical)", failCount, totalCount, "#ef4444", "🚨");
            }

            // 🎯 วาดหัวตารางเมื่อขึ้นหน้าใหม่ (หรือมีรายการ)
            if (pageNum > 1 && issues.length > 0) {
                ctx.textAlign = "left"; ctx.fillStyle = "#ef4444"; ctx.font = `900 28px ${fontName}`; ctx.fillText("🚨 รายการที่พบปัญหา", 60, currentY); currentY += 40;
                ctx.fillStyle = "#F9FAFB"; ctx.fillRect(60, currentY - 35, w - 120, 50); 
                
                // 🎯 ปรับหัวตาราง เพิ่มช่อง ID และขยับรายละเอียด
                ctx.fillStyle = "#1a1a1a"; ctx.font = `bold 20px ${fontName}`; ctx.textAlign = "left";
                ctx.fillText("ID", 80, currentY); 
                ctx.fillText("พื้นที่ | โซน", 200, currentY); 
                ctx.fillText("รายละเอียด", 450, currentY); // ขยับเข้าใกล้รูป
                ctx.fillText("ภาพประกอบ", 750, currentY); 
                ctx.fillText("สถานะ", 950, currentY); 
                currentY += 50;
            }

            if (issues.length === 0 && pageNum === 1) {
                currentY = h - 200; ctx.fillStyle = "#22c55e"; ctx.font = `bold 24px ${fontName}`; ctx.textAlign = "center"; ctx.fillText("🎉 ไม่พบปัญหาในรอบการตรวจนี้", w / 2, currentY); itemsDrawn = 1; 
            } else if (pageNum > 1) { 
                let drawnThisPage = 0;
                while (itemsDrawn < issues.length && drawnThisPage < maxItemsPageNext) {
                    const issue = issues[itemsDrawn];
                    let locStr = issue.location || ""; let line1Loc = ""; let line2Loc = "";
                    if (locStr.includes('-')) { let parts = locStr.split('-'); line1Loc = parts[0].trim(); line2Loc = parts.slice(1).join('-').trim();
                    } else { line1Loc = locStr; }
                    
                    // ปรับความยาวตัวอักษรให้พอดีกับช่องที่เล็กลงนิดหน่อย
                    if (line1Loc.length > 25) line1Loc = line1Loc.substring(0, 22) + "..."; 
                    if (line2Loc.length > 30) line2Loc = line2Loc.substring(0, 27) + "...";
                    let line1Det = issue.details || "-"; 
                    if (line1Det.length > 28) line1Det = line1Det.substring(0, 25) + "...";
                    
                    let line2Det = issue.gmrl && issue.gmrl !== '-' ? `(Ref: ${issue.gmrl})` : '';

                    // 🎯 1. แถวบน: ID | พื้นที่ | รายละเอียด (ปรับขนาดอักษรเป็น 18px)
                    ctx.fillStyle = "#374151"; ctx.textAlign = "left"; ctx.font = `bold 18px ${fontName}`; 
                    
                    ctx.fillText(issue.id || "-", 80, currentY); // วาด ID
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 180, currentY); // เส้นคั่น ID
                    
                    ctx.fillStyle = "#374151"; ctx.fillText(line1Loc, 200, currentY); // วาดพื้นที่
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 430, currentY); // เส้นคั่นพื้นที่
                    
                    ctx.fillStyle = "#374151"; ctx.fillText(line1Det, 450, currentY); // วาดรายละเอียด (ขยับใกล้รูป)
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 730, currentY); // เส้นคั่นรายละเอียด

                    // 🎯 2. ระบบวาดรูปภาพประกอบ (Thumbnail คงเดิม)
                    let thumbImg = preloadedImages[itemsDrawn];
                    let imgX = 750; let imgY = currentY - 20; let imgW = 120; let imgH = 65;

                    if (thumbImg) {
                        ctx.save();
                        ctx.beginPath();
                        let r = 8;
                        ctx.moveTo(imgX + r, imgY); ctx.lineTo(imgX + imgW - r, imgY); ctx.quadraticCurveTo(imgX + imgW, imgY, imgX + imgW, imgY + r);
                        ctx.lineTo(imgX + imgW, imgY + imgH - r); ctx.quadraticCurveTo(imgX + imgW, imgY + imgH, imgX + imgW - r, imgY + imgH);
                        ctx.lineTo(imgX + r, imgY + imgH); ctx.quadraticCurveTo(imgX, imgY + imgH, imgX, imgY + imgH - r);
                        ctx.lineTo(imgX, imgY + r); ctx.quadraticCurveTo(imgX, imgY, imgX + r, imgY); ctx.closePath();
                        ctx.clip();
                        
                        let imgAspect = thumbImg.width / thumbImg.height; let boxAspect = imgW / imgH;
                        let drawW, drawH, drawX, drawY;
                        if (imgAspect > boxAspect) {
                            drawH = imgH; drawW = thumbImg.width * (imgH / thumbImg.height);
                            drawX = imgX - (drawW - imgW) / 2; drawY = imgY;
                        } else {
                            drawW = imgW; drawH = thumbImg.height * (imgW / thumbImg.width);
                            drawX = imgX; drawY = imgY - (drawH - imgH) / 2;
                        }
                        ctx.drawImage(thumbImg, drawX, drawY, drawW, drawH);
                        ctx.restore();
                        
                        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 1; ctx.beginPath(); 
                        roundRect(ctx, imgX, imgY, imgW, imgH, 8, false, true); 
                    } else {
                        ctx.fillStyle = "#F3F4F6"; ctx.beginPath(); roundRect(ctx, imgX, imgY, imgW, imgH, 8, true, false); 
                        ctx.fillStyle = "#9CA3AF"; ctx.textAlign = "center"; ctx.font = `14px ${fontName}`;
                        ctx.fillText("ไม่มีรูป", imgX + (imgW/2), imgY + (imgH/2) + 5);
                    }

                    ctx.fillStyle = "#D1D5DB"; ctx.textAlign = "left"; ctx.fillText("|", 900, currentY); 

                    // 🎯 3. แถวล่าง: เว้นว่างใต้ ID | โซน | Ref (ปรับขนาดอักษรเป็น 16px)
                    ctx.font = `normal 16px ${fontName}`; ctx.fillStyle = "#3B82F6"; 
                    
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 180, currentY + 30); // เส้นคั่น ID บรรทัด 2
                    ctx.fillStyle = "#3B82F6"; if (line2Loc) ctx.fillText(line2Loc, 200, currentY + 30); // วาดโซน
                    
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 430, currentY + 30); // เส้นคั่นโซน
                    ctx.fillStyle = "#3B82F6"; if (line2Det) ctx.fillText(line2Det, 450, currentY + 30); // วาด Ref
                    
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 730, currentY + 30); // เส้นคั่น Ref
                    ctx.fillStyle = "#D1D5DB"; ctx.fillText("|", 900, currentY + 30); // เส้นหลังรูป

                    // วาดสถานะ
                    let statusTxt = issue.status.replace(/🔴|🟠|🟢/g, '').trim();
                    let statusColor = issue.status.includes('🔴') || statusTxt.includes('ผิดปกติ') ? "#ef4444" : issue.status.includes('🟠') || statusTxt.includes('ซ่อม') ? "#f97316" : "#22c55e";
                    
                    ctx.beginPath(); ctx.arc(930, currentY + 8, 8, 0, 2 * Math.PI); ctx.fillStyle = statusColor; ctx.fill();
                    ctx.fillStyle = statusColor; ctx.font = `bold 20px ${fontName}`; ctx.fillText(statusTxt, 950, currentY + 14); 
                    
                    ctx.strokeStyle = "#D1D5DB"; ctx.lineWidth = 1; ctx.setLineDash([6, 6]); ctx.beginPath(); ctx.moveTo(60, currentY + 55); ctx.lineTo(w - 60, currentY + 55); ctx.stroke(); ctx.setLineDash([]); 

                    currentY += rowHeight; itemsDrawn++; drawnThisPage++;
                }
            }

            pagesCanvases.push(canvas);
            if (itemsDrawn >= issues.length && pageNum > 1) break; 
            if (issues.length === 0 && pageNum === 1) break; 
            pageNum++;
        }

        pagesCanvases.forEach((c, idx) => {
            const pCtx = c.getContext('2d');
            pCtx.fillStyle = "#D1D5DB"; pCtx.textAlign = "center"; pCtx.font = `bold 20px ${fontName}`; pCtx.fillText("Summary of the report by T | H | A [ S.A.M. ]", w / 2, h - 60);
            pCtx.fillStyle = "#9CA3AF"; pCtx.textAlign = "right"; pCtx.font = `bold 20px ${fontName}`; pCtx.fillText(`หน้า ${idx + 1} / ${pagesCanvases.length}`, w - 60, h - 60);
        });

        const now = new Date(); const yyyymmdd = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        const timestamp = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
        const typePrefix = reportTypeVal === 'Routine' ? 'RT' : 'SA'; const fileName = `THA_Report_${typePrefix}-${yyyymmdd}-${timestamp}`;

        if (exportType === 'JPG') {
            const stitchCanvas = document.createElement('canvas'); stitchCanvas.width = w; stitchCanvas.height = h * pagesCanvases.length;
            const stitchCtx = stitchCanvas.getContext('2d'); pagesCanvases.forEach((c, index) => { stitchCtx.drawImage(c, 0, index * h); });
            const link = document.createElement('a'); link.href = stitchCanvas.toDataURL('image/jpeg', 0.95); link.download = `${fileName}.jpg`; link.click();
        } else if (exportType === 'PDF') {
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'pt', 'a4'); 
            pagesCanvases.forEach((c, index) => { if (index > 0) pdf.addPage(); pdf.addImage(c.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 595.28, 841.89); });
            pdf.save(`${fileName}.pdf`);
        }
        Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: `ดาวน์โหลด ${fileName}.${exportType.toLowerCase()} เรียบร้อย`, customClass: { popup: 'rounded-[2rem]', container: 'z-[999999]' } });

    } catch (error) {
        console.error(error); Swal.fire({ icon: 'error', title: 'ข้อผิดพลาด', text: 'ไม่สามารถสร้างไฟล์ได้: ' + error.message, customClass: { popup: 'rounded-3xl', container: 'z-[999999]' } });
    }
}
</script>
